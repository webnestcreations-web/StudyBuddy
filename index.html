<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Study Buddy">
<title>Study Buddy - 5th Grade Social Studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #FFECD2;
    --bg2: #FCB69F;
    --bg3: #FF9A9E;
    --card: rgba(255,255,255,0.9);
    --text: #2C3E50;
    --correct: #4CAF50;
    --correct-bg: #E8F5E9;
    --wrong: #EF5350;
    --wrong-bg: #FFEBEE;
    --warning: #FF9800;
    --warning-bg: #FFF3E0;
    --hint-bg: #FFF8E1;
    --hint-border: #FFC107;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  html { height: -webkit-fill-available; }
  .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 40px; }

  @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pop { 0% { transform:scale(0.85); opacity:0; } 60% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
  @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.03); } }
  @keyframes confettiFall { 0% { transform:translateY(-10vh) rotate(0deg); opacity:1; } 100% { transform:translateY(110vh) rotate(720deg); opacity:0; } }

  .header { text-align:center; margin-bottom:20px; animation:slideUp 0.4s ease; }
  .header h1 { font-family:'Fredoka One',cursive; font-size:40px; color:var(--text); letter-spacing:1px; text-shadow:2px 2px 0 rgba(255,255,255,0.5); }
  .header.sm h1 { font-size:26px; }
  .header p { color:#5D4037; font-size:15px; font-weight:600; margin-top:4px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:20px; background:rgba(255,255,255,0.4); border-radius:14px; padding:4px; }
  .tab { flex:1; text-align:center; padding:10px 8px; border-radius:11px; font-weight:800; font-size:14px; cursor:pointer; border:none; background:transparent; font-family:inherit; color:#888; transition:all 0.2s; }
  .tab.active { background:white; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.08); }

  .intro-box { text-align:center; color:#4A4A4A; font-size:14px; margin-bottom:20px; background:rgba(255,255,255,0.6); border-radius:16px; padding:14px 18px; font-weight:600; line-height:1.6; }

  /* Topic cards */
  .topic-card { background:var(--card); border-radius:18px; padding:16px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:all 0.2s ease; box-shadow:0 3px 15px rgba(0,0,0,0.05); margin-bottom:10px; }
  .topic-card:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(0,0,0,0.1); }
  .topic-card:active { transform:scale(0.98); }
  .t-icon { font-size:28px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; border-radius:13px; flex-shrink:0; }
  .t-info { flex:1; min-width:0; }
  .t-name { font-weight:800; font-size:15px; }
  .t-meta { font-size:12px; color:#999; font-weight:600; margin-top:2px; }
  .t-arrow { font-size:18px; color:#ccc; flex-shrink:0; }

  /* Progress ring */
  .p-ring { position:relative; flex-shrink:0; width:44px; height:44px; }
  .p-ring svg { transform:rotate(-90deg); display:block; }
  .p-ring-txt { position:absolute; top:0; right:0; bottom:0; left:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; }

  /* Nav bar */
  .nav { display:flex; align-items:center; gap:10px; margin-bottom:14px; animation:slideUp 0.3s ease; }
  .back-btn { background:rgba(255,255,255,0.7); border:none; border-radius:11px; padding:8px 13px; cursor:pointer; font-weight:700; font-size:13px; color:#666; font-family:inherit; }
  .prog-wrap { flex:1; background:rgba(255,255,255,0.5); border-radius:8px; height:7px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:8px; transition:width 0.4s ease; }
  .prog-num { font-size:12px; font-weight:700; color:#666; }

  .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:18px; font-size:12px; font-weight:700; margin-bottom:12px; }

  /* Question card */
  .q-card { background:var(--card); border-radius:22px; padding:22px 20px; box-shadow:0 6px 25px rgba(0,0,0,0.07); animation:slideUp 0.35s ease; }
  .q-badge { display:inline-block; color:white; padding:3px 11px; border-radius:9px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
  .q-text { font-size:17px; font-weight:800; line-height:1.5; margin-bottom:18px; }

  /* Options */
  .opts { display:flex; flex-direction:column; gap:9px; }
  .opt { background:rgba(245,245,245,0.8); border:2px solid transparent; border-radius:14px; padding:13px 16px; cursor:pointer; text-align:left; font-size:14px; font-weight:600; color:#333; font-family:inherit; transition:all 0.2s; display:flex; align-items:center; gap:11px; -webkit-appearance:none; }
  .opt:active:not(.lk) { transform:scale(0.98); }
  .opt.lk { cursor:default; }
  .opt.cor { background:var(--correct-bg); border-color:var(--correct); color:#2E7D32; }
  .opt.wrg { background:var(--wrong-bg); border-color:var(--wrong); color:#C62828; }
  .opt-ltr { width:28px; height:28px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; flex-shrink:0; }

  /* T/F buttons */
  .tf-wrap { display:flex; gap:12px; }
  .tf { flex:1; padding:16px; border-radius:16px; border:3px solid #E0E0E0; background:white; cursor:pointer; font-family:inherit; font-size:17px; font-weight:800; transition:all 0.2s; text-align:center; -webkit-appearance:none; }
  .tf:active:not(.lk) { transform:scale(0.96); }
  .tf.lk { cursor:default; }
  .tf.cor { background:var(--correct-bg); border-color:var(--correct); color:#2E7D32; }
  .tf.wrg { background:var(--wrong-bg); border-color:var(--wrong); color:#C62828; }

  /* Explanation */
  .expl { margin-top:14px; padding:14px 16px; border-radius:14px; animation:slideUp 0.3s ease; line-height:1.6; }
  .expl.cor { background:var(--correct-bg); border:2px solid var(--correct); }
  .expl.inc { background:var(--warning-bg); border:2px solid var(--warning); }
  .expl-t { font-weight:800; font-size:14px; margin-bottom:5px; }
  .expl-b { font-size:13px; color:#444; font-weight:600; }
  .fun { margin-top:8px; padding:9px 13px; background:#F3E5F5; border-radius:11px; font-size:12px; font-weight:600; color:#6A1B9A; border-left:3px solid #AB47BC; }

  /* Writing */
  .hints { background:var(--hint-bg); border-radius:13px; padding:11px 15px; margin-bottom:12px; border-left:3px solid var(--hint-border); }
  .hints-t { font-weight:800; font-size:12px; color:#F57F17; margin-bottom:5px; }
  .hint { font-size:12px; color:#795548; margin-bottom:2px; font-weight:600; }
  .w-area { width:100%; min-height:120px; border-radius:14px; border:2px solid #E0E0E0; padding:13px 15px; font-size:14px; font-family:inherit; font-weight:600; resize:vertical; color:#333; line-height:1.6; -webkit-appearance:none; }
  .w-area:focus { outline:none; border-color:#FF6B6B; box-shadow:0 0 0 3px rgba(255,107,107,0.15); }
  .w-area:disabled { background:#F5F5F5; }
  .wc { text-align:right; font-size:11px; color:#999; font-weight:600; margin-top:3px; }
  .w-fb { margin-top:12px; padding:13px 16px; border-radius:14px; font-size:13px; font-weight:600; color:#333; animation:slideUp 0.3s ease; line-height:1.5; }
  .w-fb.great { background:var(--correct-bg); border:2px solid var(--correct); }
  .w-fb.good { background:var(--hint-bg); border:2px solid var(--hint-border); }
  .w-fb.try { background:var(--warning-bg); border:2px solid var(--warning); }

  /* Buttons */
  .sub-btn { margin-top:10px; border:none; border-radius:13px; padding:11px 24px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; color:white; -webkit-appearance:none; }
  .sub-btn:disabled { background:#ccc !important; cursor:default; }
  .nxt-btn { margin-top:16px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:13px; padding:13px 28px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; width:100%; letter-spacing:0.5px; -webkit-appearance:none; }
  .nxt-btn:active { transform:scale(0.98); }

  .score-tr { margin-top:12px; text-align:center; font-size:13px; font-weight:700; color:rgba(255,255,255,0.9); text-shadow:1px 1px 2px rgba(0,0,0,0.1); }
  .streak { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:4px; font-size:12px; }

  /* Results */
  .res-card { text-align:center; background:var(--card); border-radius:24px; padding:32px 24px; box-shadow:0 8px 35px rgba(0,0,0,0.08); animation:pop 0.4s ease; }
  .res-emoji { font-size:56px; margin-bottom:10px; animation:float 2s ease-in-out infinite; }
  .res-title { font-family:'Fredoka One',cursive; font-size:26px; margin-bottom:6px; }
  .res-topic { font-size:15px; color:#666; font-weight:600; margin-bottom:18px; }
  .res-ring { display:inline-flex; position:relative; margin-bottom:18px; }
  .res-pct { position:absolute; top:0; right:0; bottom:0; left:0; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; }
  .res-score { font-size:17px; font-weight:700; margin-bottom:6px; }
  .res-msg { font-size:13px; color:#888; font-weight:600; margin-bottom:24px; }
  .res-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .r-btn { border:none; border-radius:13px; padding:13px 24px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; -webkit-appearance:none; }
  .r-btn.pri { color:white; }
  .r-btn.sec { background:rgba(0,0,0,0.06); color:#555; }

  /* Review */
  .rev { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:8px; }
  .rev-q { font-weight:700; font-size:13px; margin-bottom:4px; }
  .rev-a { font-size:12px; color:#555; font-weight:600; }
  .rev-c { font-size:11px; font-weight:800; margin-top:3px; color:var(--correct); }

  /* Calendar tracker */
  .cal-card { background:var(--card); border-radius:20px; padding:20px 18px; box-shadow:0 4px 20px rgba(0,0,0,0.06); margin-bottom:16px; animation:slideUp 0.4s ease; }
  .cal-title { font-weight:800; font-size:16px; margin-bottom:4px; }
  .cal-sub { font-size:12px; color:#888; font-weight:600; margin-bottom:14px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; text-align:center; }
  .cal-hdr { font-size:11px; font-weight:800; color:#AAA; padding-bottom:4px; }
  .cal-day { width:100%; aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#999; background:rgba(0,0,0,0.03); }
  .cal-day.studied { background:#E8F5E9; color:#2E7D32; position:relative; }
  .cal-day.studied::after { content:'✓'; position:absolute; top:1px; right:3px; font-size:8px; color:#4CAF50; }
  .cal-day.today { border:2px solid #FF6B6B; color:#FF6B6B; font-weight:900; }
  .cal-day.empty { background:transparent; }

  /* Stats row */
  .stats-row { display:flex; gap:10px; margin-bottom:16px; }
  .stat-card { flex:1; background:var(--card); border-radius:16px; padding:14px 12px; text-align:center; box-shadow:0 3px 15px rgba(0,0,0,0.05); }
  .stat-num { font-family:'Fredoka One',cursive; font-size:28px; }
  .stat-lbl { font-size:11px; color:#888; font-weight:700; margin-top:2px; }

  /* Confetti */
  .confetti { position:fixed; top:0; right:0; bottom:0; left:0; pointer-events:none; z-index:998; }
  .conf-p { position:absolute; width:10px; height:10px; top:-5%; }

  .footer { text-align:center; margin-top:24px; font-size:11px; color:rgba(255,255,255,0.55); font-weight:600; }

  @media(max-width:480px) {
    .header h1 { font-size:32px; }
    .header.sm h1 { font-size:22px; }
    .q-text { font-size:15px; }
    .cal-day { font-size:10px; }
    .stat-num { font-size:24px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
"use strict";
document.addEventListener('DOMContentLoaded', function() {

/* ===== QUESTION DATA ===== */
var TOPICS = [
  {
    id:"iron-curtain", name:"The Iron Curtain", emoji:"\u{1FAB7}", color:"#E74C3C",
    questions:[
      {type:"multiple",q:"What did the term 'Iron Curtain' describe?",options:["A real curtain made of iron in Europe","The invisible boundary dividing communist Eastern Europe from democratic Western Europe","A new type of weapon used in World War II","A wall built around the United States"],answer:1,explanation:"The 'Iron Curtain' was a term used to describe the invisible line that separated communist countries in Eastern Europe (controlled by the Soviet Union) from the democratic countries in Western Europe.",funFact:"The Iron Curtain wasn't a real physical barrier at first \u2014 it was an idea! But later, real fences and walls WERE built along parts of it."},
      {type:"multiple",q:"Who first made the term 'Iron Curtain' famous in a speech?",options:["President Harry Truman","Joseph Stalin","Winston Churchill","President Eisenhower"],answer:2,explanation:"Winston Churchill, the former Prime Minister of Britain, used the term 'Iron Curtain' in a famous 1946 speech to warn the world about the Soviet Union's control over Eastern Europe.",funFact:"Churchill gave this speech in Fulton, Missouri \u2014 a tiny town in the middle of America!"},
      {type:"tf",q:"The Iron Curtain was a physical wall that stretched across all of Europe.",answer:false,explanation:"The Iron Curtain was NOT a real wall (at least not at first). It was a term used to describe the political divide between the communist East and democratic West. However, some physical barriers like the Berlin Wall were eventually built."},
      {type:"tf",q:"Countries behind the Iron Curtain were controlled or heavily influenced by the Soviet Union.",answer:true,explanation:"Yes! Countries like Poland, East Germany, Czechoslovakia, Hungary, Romania, and Bulgaria were behind the Iron Curtain and under Soviet control. People had very limited freedoms."},
      {type:"multiple",q:"What were the two sides of the Cold War?",options:["The United States vs. Great Britain","The United States and its allies (the West) vs. the Soviet Union and its allies (the East)","North America vs. South America","Europe vs. Asia"],answer:1,explanation:"The Cold War was between the United States and its democratic allies ('the West') and the Soviet Union and its communist allies ('the East'). It was called 'cold' because they never fought each other directly."},
      {type:"multiple",q:"Why was the Cold War called 'cold'?",options:["It was fought in cold places like Siberia","The two sides threatened each other but never fought directly in an all-out war","It happened during winter","The weapons used were very cold"],answer:1,explanation:"It was called 'Cold' because the U.S. and Soviet Union never fought each other directly. Instead, they competed through threats, spying, the arms race, space race, and smaller conflicts."},
      {type:"tf",q:"The Cold War started right after World War II ended.",answer:true,explanation:"Yes! After WWII ended in 1945, the U.S. and Soviet Union \u2014 who had been allies against Nazi Germany \u2014 quickly became rivals. By 1947, the Cold War was clearly underway."},
      {type:"write",q:"In your own words, explain what the 'Iron Curtain' was and why it was important during the Cold War.",hints:["What two sides did it separate?","What kind of governments were on each side?","Why were people worried about it?","Who made the term famous?"],keyWords:["communist","democratic","Europe","Soviet","separate","divide","Churchill","freedom","control","West","East"]}
    ]
  },
  {
    id:"stopping-communism", name:"Stopping Communism", emoji:"\u2708\uFE0F", color:"#3498DB",
    questions:[
      {type:"multiple",q:"Why did the United States organize the Berlin Airlift?",options:["To send soldiers to fight in Berlin","To fly food and supplies to people in West Berlin when the Soviet Union blocked all roads","To help people escape from East Berlin","To drop leaflets over the Soviet Union"],answer:1,explanation:"When the Soviet Union blocked all roads and trains into West Berlin in 1948, the U.S. and allies flew planes full of food, fuel, and supplies. This lasted almost a year!",funFact:"One pilot dropped candy with tiny parachutes for kids \u2014 he became known as the 'Candy Bomber'! \ud83c\udf6c"},
      {type:"multiple",q:"What was the Korean War about?",options:["North Korea (communist) invaded South Korea, and the U.S. helped defend South Korea","South Korea attacked the United States","Korea wanted to take over Japan","The U.S. wanted to make Korea a state"],answer:0,explanation:"In 1950, communist North Korea invaded South Korea. The United States and other countries sent troops to help South Korea fight back.",funFact:"The Korean War is sometimes called 'The Forgotten War' because it happened between WWII and Vietnam."},
      {type:"multiple",q:"What is NATO (North Atlantic Treaty Organization)?",options:["A space exploration group","A group of countries that agreed to protect each other if attacked","A trade agreement between the U.S. and Russia","A United Nations club for kids"],answer:1,explanation:"NATO was created in 1949. Countries in North America and Europe agreed that if one member was attacked, all the others would help defend it."},
      {type:"tf",q:"During the Berlin Airlift, the U.S. used ships to deliver supplies to West Berlin.",answer:false,explanation:"No \u2014 the Soviets blocked all roads, rail, and waterways! That's why the U.S. had to use AIRPLANES to fly supplies over the blockade."},
      {type:"tf",q:"NATO was created so that countries could protect each other from attack.",answer:true,explanation:"Correct! NATO's main idea was 'collective defense' \u2014 an attack on one member is treated as an attack on ALL members."},
      {type:"multiple",q:"How long did the Berlin Airlift last?",options:["About 2 weeks","About 3 months","About 11 months (almost a year)","About 5 years"],answer:2,explanation:"The Berlin Airlift lasted from June 1948 to May 1949 \u2014 almost a full year! Over 200,000 flights delivered food, coal, and medicine."},
      {type:"multiple",q:"What does 'containment' mean in the Cold War?",options:["Putting communists in containers","The U.S. strategy of stopping communism from spreading to new countries","Building walls around communist countries","Containing nuclear weapons in one place"],answer:1,explanation:"Containment was the main U.S. strategy \u2014 stop communism from spreading to MORE countries, even if they couldn't remove it from countries that already had it."},
      {type:"tf",q:"The Korean War ended with Korea being united as one country.",answer:false,explanation:"No! Korea is STILL divided into communist North Korea and democratic South Korea. They are still divided today!"},
      {type:"multiple",q:"Which was NOT a way the U.S. tried to stop communism?",options:["The Berlin Airlift","The Korean War","Joining NATO","Joining the Soviet Union"],answer:3,explanation:"The U.S. would never join the Soviet Union! The Berlin Airlift, Korean War, and NATO were all real ways the U.S. tried to contain communism."},
      {type:"write",q:"Name three ways the United States tried to stop communism from spreading. Pick one and explain what happened.",hints:["Think about: Berlin Airlift, Korean War, NATO","Pick one and explain what happened","Why did the U.S. do this?"],keyWords:["Berlin","airlift","Korean","NATO","communism","protect","spread","containment","allies","Soviet","defend"]},
      {type:"write",q:"Imagine you are a child living in West Berlin during the blockade. Write about what it might have been like when the supply planes started arriving.",hints:["What supplies did you need?","How did you feel when roads were blocked?","What was it like seeing planes fly in every few minutes?"],keyWords:["food","planes","supplies","scared","hope","airlift","blocked","grateful"]}
    ]
  },
  {
    id:"cold-war-people", name:"Cold War People & Events", emoji:"\ud83d\udd75\uFE0F", color:"#9B59B6",
    questions:[
      {type:"multiple",q:"Who was Joseph McCarthy?",options:["A Soviet spy who lived in America","A U.S. Senator who accused many Americans of being communists, often without proof","The president during the Cold War","A famous Cold War scientist"],answer:1,explanation:"Senator McCarthy claimed many Americans were secretly communists. He ruined many careers with accusations that had little evidence. This became known as 'McCarthyism.'",funFact:"McCarthy even accused people in Hollywood! Many actors and writers lost their jobs just because someone SAID they might be communist."},
      {type:"multiple",q:"Who was Nikita Khrushchev?",options:["The President of the United States","A famous American general","The leader of the Soviet Union during part of the Cold War","The inventor of the atomic bomb"],answer:2,explanation:"Nikita Khrushchev led the Soviet Union from 1958 to 1964. He was involved in many major Cold War events, including the Cuban Missile Crisis."},
      {type:"multiple",q:"What was the Cuban Missile Crisis?",options:["A war fought in Cuba that lasted 5 years","A tense 13-day standoff when the Soviet Union put nuclear missiles in Cuba, close to the U.S.","A trade agreement between Cuba and the United States","A hurricane that hit Cuba"],answer:1,explanation:"In 1962, the Soviet Union secretly placed nuclear missiles in Cuba, only 90 miles from Florida! President Kennedy demanded they be removed. For 13 scary days, the world was on the edge of nuclear war.",funFact:"Cuba is only about 90 miles from Florida \u2014 you could almost see it on a clear day!"},
      {type:"multiple",q:"Why was the Vietnam War important to the Cold War?",options:["The U.S. fought to stop communist North Vietnam from taking over South Vietnam","Vietnam attacked the United States directly","It was the first war in space","Vietnam wanted to join NATO"],answer:0,explanation:"The U.S. sent troops to help South Vietnam fight communist North Vietnam. It was a long, difficult war (1955-1975) that divided Americans at home."},
      {type:"tf",q:"McCarthyism means accusing people of being communists without real proof.",answer:true,explanation:"Yes! McCarthyism became a word meaning making serious accusations without real evidence. Senator McCarthy ruined many innocent people's lives this way."},
      {type:"tf",q:"The Cuban Missile Crisis lasted for several years.",answer:false,explanation:"It lasted only 13 days in October 1962! But those were some of the scariest days in world history."},
      {type:"multiple",q:"Who was the U.S. President during the Cuban Missile Crisis?",options:["Dwight Eisenhower","Lyndon B. Johnson","John F. Kennedy","Richard Nixon"],answer:2,explanation:"President Kennedy led the U.S. during the Cuban Missile Crisis in 1962. He demanded the Soviet Union remove the missiles and set up a naval blockade around Cuba."},
      {type:"tf",q:"The Vietnam War was very popular with all Americans.",answer:false,explanation:"Not at all! The Vietnam War deeply divided America. Many people protested against it. It was one of the most controversial wars in American history."},
      {type:"multiple",q:"How did the Vietnam War affect Americans at home?",options:["Everyone agreed it was right","It divided the country \u2014 many protested while others supported it","Nobody paid attention","It made everyone join the military"],answer:1,explanation:"The Vietnam War caused huge divisions. Millions protested in the streets while others believed the U.S. needed to fight communism."},
      {type:"multiple",q:"What did Khrushchev eventually agree to do during the Cuban Missile Crisis?",options:["Attack the United States","Remove the missiles from Cuba","Put more missiles in Cuba","Invade Florida"],answer:1,explanation:"After 13 tense days, Khrushchev agreed to remove the missiles from Cuba. The U.S. promised not to invade Cuba and secretly removed some of its own missiles from Turkey."},
      {type:"write",q:"Why was the Cuban Missile Crisis so scary for Americans and the world?",hints:["How close was Cuba to the U.S.?","What kind of weapons?","What could have happened?","How long did it last?"],keyWords:["nuclear","missiles","Cuba","close","war","Kennedy","Soviet","scary","destroy","13 days","Khrushchev"]},

/* ===== STATE ===== */
var state = {
  screen:'home', tab:'topics', topic:null, qi:0, sel:null, showed:false,
  score:0, total:0, writeVal:'', writeDone:false, writeFB:null,
  streak:0, bestStreak:0, scores:{}, history:[], answers:[]
};

function todayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
}

function loadData() {
  try {
    var s = localStorage.getItem('sb_data');
    if(s) {
      var d = JSON.parse(s);
      state.scores = d.scores || {};
      state.bestStreak = d.bestStreak || 0;
      state.history = d.history || [];
    }
  } catch(e){}
}

function saveData() {
  try {
    localStorage.setItem('sb_data', JSON.stringify({
      scores: state.scores,
      bestStreak: state.bestStreak,
      history: state.history
    }));
  } catch(e){}
}

function logStudyDay() {
  var today = todayStr();
  if (state.history.indexOf(today) === -1) {
    state.history.push(today);
    saveData();
  }
}

loadData();

/* ===== HELPERS ===== */
function el(id) { return document.getElementById(id); }
function qs(s) { return document.querySelectorAll(s); }

function pRing(pct,sz,col) {
  var r=(sz-6)/2, c=2*Math.PI*r, o=c-(pct/100)*c;
  return '<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg);display:block"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="#e0e0e0" stroke-width="5"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="5" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" stroke-linecap="round" style="transition:stroke-dashoffset 0.6s ease"/></svg>';
}

function confettiHTML() {
  var cols=['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE'];
  var h='<div class="confetti">';
  for(var i=0;i<35;i++){
    var c=cols[i%7],l=Math.random()*100,dl=Math.random()*2,du=2+Math.random()*3,br=Math.random()>0.5?'50%':'2px';
    h+='<div class="conf-p" style="left:'+l+'%;background:'+c+';border-radius:'+br+';animation:confettiFall '+du+'s linear '+dl+'s forwards"></div>';
  }
  return h+'</div>';
}

/* ===== CALENDAR ===== */
function renderCalendar() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth();
  var today = now.getDate();
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var h = '<div class="cal-card">';
  h += '<div class="cal-title">\ud83d\udcc5 '+monthNames[month]+' '+year+'</div>';
  h += '<div class="cal-sub">Days you studied are marked with a check!</div>';
  h += '<div class="cal-grid">';
  
  for(var d=0;d<7;d++) h+='<div class="cal-hdr">'+dayNames[d]+'</div>';
  for(var e=0;e<firstDay;e++) h+='<div class="cal-day empty"></div>';
  
  for(var i=1;i<=daysInMonth;i++){
    var ds = year+'-'+(month+1<10?'0':'')+(month+1)+'-'+(i<10?'0':'')+i;
    var isToday = i===today;
    var studied = state.history.indexOf(ds) !== -1;
    var cls = 'cal-day';
    if(studied) cls += ' studied';
    if(isToday) cls += ' today';
    h += '<div class="'+cls+'">'+i+'</div>';
  }
  
  h += '</div></div>';
  return h;
}

/* ===== STATS ===== */
function renderStats() {
  var totalStudied = state.history.length;
  var completedTopics = Object.keys(state.scores).length;
  var avgScore = 0;
  var vals = Object.keys(state.scores).map(function(k){return state.scores[k];});
  if(vals.length) avgScore = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);

  return '<div class="stats-row" style="animation:slideUp 0.3s ease">' +
    '<div class="stat-card"><div class="stat-num" style="color:#FF6B6B">'+totalStudied+'</div><div class="stat-lbl">Days Studied</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#4ECDC4">'+completedTopics+'/'+TOPICS.length+'</div><div class="stat-lbl">Topics Done</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#F39C12">'+(avgScore||'\u2014')+(avgScore?'%':'')+'</div><div class="stat-lbl">Avg Score</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#9B59B6">'+(state.bestStreak||0)+'</div><div class="stat-lbl">\ud83d\udd25 Best Streak</div></div>' +
  '</div>';
}

/* ===== RENDER ===== */
function render() {
  var app = el('app');
  if(state.screen==='home') app.innerHTML = renderHome();
  else if(state.screen==='quiz') app.innerHTML = renderQuiz();
  else if(state.screen==='results') app.innerHTML = renderResults();
  bind();
}

function renderHome() {
  var totalQ = TOPICS.reduce(function(s,t){return s+t.questions.length;},0);

  var tabs = '<div class="tabs">' +
    '<button class="tab'+(state.tab==='topics'?' active':'')+'" data-tab="topics">\ud83d\udcda Topics</button>' +
    '<button class="tab'+(state.tab==='progress'?' active':'')+'" data-tab="progress">\ud83d\udcc8 Progress</button>' +
  '</div>';

  var content = '';
  if(state.tab==='topics') {
    content = '<div class="intro-box">Pick a topic to start learning! <strong>'+totalQ+' questions</strong> across '+TOPICS.length+' topics. \ud83c\udfaf</div>';
    TOPICS.forEach(function(t,i){
      var best = state.scores[t.id];
      var mc=0,tf=0,wr=0;
      t.questions.forEach(function(q){if(q.type==='multiple')mc++;else if(q.type==='tf')tf++;else wr++;});
      var ring = best!==undefined ? '<div class="p-ring">'+pRing(best,44,t.color)+'<div class="p-ring-txt" style="color:'+t.color+'">'+best+'%</div></div>' : '';
      content += '<div class="topic-card" data-ti="'+i+'" style="border-left:5px solid '+t.color+';animation:slideUp 0.4s ease '+(i*0.06)+'s both">' +
        '<div class="t-icon" style="background:'+t.color+'18">'+t.emoji+'</div>' +
        '<div class="t-info"><div class="t-name">'+t.name+'</div><div class="t-meta">'+t.questions.length+' questions \u00b7 '+mc+' quiz \u00b7 '+tf+' T/F \u00b7 '+wr+' writing</div></div>' +
        ring + '<div class="t-arrow">\u2192</div></div>';
    });
  } else {
    content = renderStats() + renderCalendar();
    // Per-topic breakdown
    content += '<div class="cal-card"><div class="cal-title">\ud83c\udfc6 Best Scores by Topic</div><div class="cal-sub">Try to get 100% on each one!</div>';
    TOPICS.forEach(function(t){
      var best = state.scores[t.id];
      var pct = best !== undefined ? best : 0;
      var done = best !== undefined;
      content += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)">' +
        '<span style="font-size:22px">'+t.emoji+'</span>' +
        '<span style="flex:1;font-weight:700;font-size:14px">'+t.name+'</span>' +
        '<div style="width:100px;height:8px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+t.color+';border-radius:4px;transition:width 0.5s"></div></div>' +
        '<span style="font-weight:800;font-size:13px;color:'+(done?t.color:'#ccc')+';min-width:38px;text-align:right">'+(done?pct+'%':'\u2014')+'</span>' +
      '</div>';
    });
    content += '</div>';
  }

  return '<div class="header"><h1>\ud83d\udcda Study Buddy</h1><p>5th Grade Social Studies \u2728</p></div>' + tabs + content +
    '<div class="footer">Your scores are saved automatically \u2764\uFE0F</div>';
}

function renderQuiz() {
  var t = state.topic, q = t.questions[state.qi];
  var prog = ((state.qi+1)/t.questions.length)*100;
  var qContent = '';

  if(q.type==='multiple') qContent = renderMC(q,t);
  else if(q.type==='tf') qContent = renderTF(q,t);
  else qContent = renderWR(q,t);

  var streakH = state.streak>=2 ? '<div class="streak">\ud83d\udd25 '+state.streak+' in a row!</div>' : '';

  return '<div class="header sm"><h1>\ud83d\udcda Study Buddy</h1></div>' +
    '<div class="nav"><button class="back-btn" id="bk">\u2190 Back</button>' +
    '<div class="prog-wrap"><div class="prog-fill" style="width:'+prog+'%;background:'+t.color+'"></div></div>' +
    '<span class="prog-num">'+(state.qi+1)+'/'+t.questions.length+'</span></div>' +
    '<div class="badge" style="background:'+t.color+'20;color:'+t.color+'">'+t.emoji+' '+t.name+'</div>' +
    '<div class="q-card"><div class="q-badge" style="background:'+(q.type==='write'?'#FF6B6B':q.type==='tf'?'#FF9800':t.color)+'">' +
    (q.type==='write'?'\u270f\uFE0F Writing':q.type==='tf'?'\u26a1 True or False':'\ud83e\udde0 Quiz') + '</div>' +
    '<div class="q-text">'+q.q+'</div>'+qContent+'</div>' +
    '<div class="score-tr">Score: '+state.score+'/'+state.total+' '+'\u2b50'.repeat(Math.min(state.score,8))+streakH+'</div>';
}

function renderMC(q,t) {
  var L=['A','B','C','D'];
  var h='<div class="opts">';
  q.options.forEach(function(o,i){
    var cls='opt',bg=t.color+'20',lc=t.color,ic=L[i];
    if(state.showed){
      cls+=' lk';
      if(i===q.answer){cls+=' cor';bg='#4CAF50';lc='white';ic='\u2713';}
      else if(i===state.sel){cls+=' wrg';bg='#EF5350';lc='white';ic='\u2717';}
    }
    h+='<button class="'+cls+'" data-oi="'+i+'"><span class="opt-ltr" style="background:'+bg+';color:'+lc+'">'+ic+'</span>'+o+'</button>';
  });
  h+='</div>';
  if(state.showed) h+=explHTML(q,state.sel===q.answer);
  return h;
}

function renderTF(q,t) {
  var tc='tf',fc='tf';
  if(state.showed){
    tc+=' lk';fc+=' lk';
    if(q.answer===true){tc+=' cor';if(state.sel===false)fc+=' wrg';}
    else{fc+=' cor';if(state.sel===true)tc+=' wrg';}
  }
  var h='<div class="tf-wrap"><button class="'+tc+'" data-tv="true">\u2705 TRUE</button><button class="'+fc+'" data-tv="false">\u274c FALSE</button></div>';
  if(state.showed) h+=explHTML(q,state.sel===q.answer);
  return h;
}

function explHTML(q,correct) {
  var h='<div class="expl '+(correct?'cor':'inc')+'"><div class="expl-t" style="color:'+(correct?'#2E7D32':'#E65100')+'">'+(correct?'\ud83c\udf89 Correct!':'\u274c Not quite \u2014 but now you know!')+'</div><div class="expl-b">'+q.explanation+'</div></div>';
  if(q.funFact) h+='<div class="fun">\ud83e\udd13 <strong>Fun Fact:</strong> '+q.funFact+'</div>';
  h+='<button class="nxt-btn" id="nxt">'+(state.qi<state.topic.questions.length-1?'Next Question \u2192':'See My Results! \ud83c\udfc6')+'</button>';
  return h;
}

function renderWR(q,t) {
  var wc = state.writeVal.trim() ? state.writeVal.trim().split(/\s+/).length : 0;
  var h='<div class="hints"><div class="hints-t">\ud83d\udca1 Hints to help you:</div>';
  q.hints.forEach(function(hi){h+='<div class="hint">\u2022 '+hi+'</div>';});
  h+='</div>';
  h+='<textarea class="w-area" id="wa" placeholder="Type your answer here... Try 2-3 sentences!"'+(state.writeDone?' disabled':'')+'>'+state.writeVal+'</textarea>';
  h+='<div class="wc">'+wc+' word'+(wc!==1?'s':'')+'</div>';
  if(!state.writeDone) h+='<button class="sub-btn" id="chk" style="background:'+(state.writeVal.trim()?t.color:'#ccc')+'"'+(state.writeVal.trim()?'':' disabled')+'>Check My Answer \u270f\uFE0F</button>';
  if(state.writeFB) h+='<div class="w-fb '+state.writeFB.type+'">'+state.writeFB.msg+'</div>';
  if(state.writeDone) h+='<button class="nxt-btn" id="nxt">'+(state.qi<state.topic.questions.length-1?'Next Question \u2192':'See My Results! \ud83c\udfc6')+'</button>';
  return h;
}

function renderResults() {
  var t=state.topic, pct=state.total>0?Math.round(state.score/state.total*100):0;
  var emoji,title,msg;
  if(pct>=90){emoji='\ud83c\udfc6';title='AMAZING Job!';msg="You're a Social Studies superstar! \ud83c\udf1f";}
  else if(pct>=70){emoji='\u2b50';title='Great Work!';msg='You really know your stuff! \ud83d\udcaa';}
  else if(pct>=50){emoji='\ud83d\udcd6';title='Good Effort!';msg="You're getting there! Try again! \ud83d\udca1";}
  else{emoji='\ud83c\udf31';title='Keep Learning!';msg='Practice makes perfect! \ud83d\udcda';}

  var revH='<div style="text-align:left;margin-top:22px"><h3 style="font-size:15px;margin-bottom:10px;color:#555">\ud83d\udccb Review:</h3>';
  state.answers.forEach(function(a,i){
    var bc=a.correct?'#4CAF50':'#EF5350';
    revH+='<div class="rev" style="border-left:4px solid '+bc+'"><div class="rev-q">'+(a.correct?'\u2705':'\u274c')+' '+a.question+'</div><div class="rev-a">'+a.yourAnswer+'</div>';
    if(!a.correct&&a.correctAnswer) revH+='<div class="rev-c">\u2713 Correct: '+a.correctAnswer+'</div>';
    revH+='</div>';
  });
  revH+='</div>';

  return (pct>=70?confettiHTML():'') +
    '<div class="header sm"><h1>\ud83d\udcda Study Buddy</h1></div>' +
    '<div class="res-card"><div class="res-emoji">'+emoji+'</div><div class="res-title">'+title+'</div>' +
    '<div class="res-topic">'+t.emoji+' '+t.name+'</div>' +
    '<div class="res-ring">'+pRing(pct,100,t.color)+'<div class="res-pct" style="color:'+t.color+'">'+pct+'%</div></div>' +
    '<div class="res-score">You got <strong>'+state.score+'</strong> out of <strong>'+state.total+'</strong> right!</div>' +
    (state.bestStreak>0?'<div style="font-size:13px;color:#F39C12;font-weight:700;margin-bottom:6px">\ud83d\udd25 Best streak: '+state.bestStreak+' in a row!</div>':'') +
    '<div class="res-msg">'+msg+'</div>' +
    '<div class="res-btns"><button class="r-btn pri" id="retry" style="background:'+t.color+'">Try Again \ud83d\udd04</button><button class="r-btn sec" id="hm">All Topics \ud83d\udcda</button></div>' +
    revH + '</div><div class="footer">\u2764\uFE0F</div>';
}

/* ===== EVENTS ===== */
function bind() {
  qs('.tab').forEach(function(b){b.addEventListener('click',function(){state.tab=b.dataset.tab;render();});});
  qs('.topic-card').forEach(function(c){c.addEventListener('click',function(){startTopic(TOPICS[parseInt(c.dataset.ti)]);});});
  var bk=el('bk'); if(bk) bk.addEventListener('click',goHome);
  qs('.opt:not(.lk)').forEach(function(b){b.addEventListener('click',function(){if(!state.showed)pickMC(parseInt(b.dataset.oi));});});
  qs('.tf:not(.lk)').forEach(function(b){b.addEventListener('click',function(){if(!state.showed)pickTF(b.dataset.tv==='true');});});
  var wa=el('wa'); if(wa) wa.addEventListener('input',function(e){
    state.writeVal=e.target.value;
    var wc=state.writeVal.trim()?state.writeVal.trim().split(/\s+/).length:0;
    var wcEl=document.querySelector('.wc'); if(wcEl) wcEl.textContent=wc+' word'+(wc!==1?'s':'');
    var ck=el('chk'); if(ck){ck.disabled=!state.writeVal.trim();ck.style.background=state.writeVal.trim()?state.topic.color:'#ccc';}
  });
  var ck=el('chk'); if(ck) ck.addEventListener('click',checkWrite);
  var nx=el('nxt'); if(nx) nx.addEventListener('click',nextQ);
  var rt=el('retry'); if(rt) rt.addEventListener('click',function(){startTopic(state.topic);});
  var hm=el('hm'); if(hm) hm.addEventListener('click',goHome);
}

/* ===== LOGIC ===== */
function startTopic(t) {
  state.topic=t; state.qi=0; state.sel=null; state.showed=false;
  state.score=0; state.total=0; state.writeVal=''; state.writeDone=false;
  state.writeFB=null; state.streak=0; state.answers=[];
  state.screen='quiz';
  logStudyDay();
  render(); window.scrollTo(0,0);
}

function pickMC(i) {
  var q=state.topic.questions[state.qi];
  state.sel=i; state.showed=true; state.total++;
  var c=i===q.answer;
  if(c){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
  else state.streak=0;
  state.answers.push({question:q.q,yourAnswer:(c?'\u2713 ':'\u2717 ')+q.options[i],correctAnswer:c?null:q.options[q.answer],correct:c});
  render();
}

function pickTF(v) {
  var q=state.topic.questions[state.qi];
  state.sel=v; state.showed=true; state.total++;
  var c=v===q.answer;
  if(c){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
  else state.streak=0;
  state.answers.push({question:q.q,yourAnswer:(c?'\u2713 ':'\u2717 ')+(v?'True':'False'),correctAnswer:c?null:(q.answer?'True':'False'),correct:c});
  render();
}

function checkWrite() {
  var q=state.topic.questions[state.qi];
  var low=state.writeVal.toLowerCase();
  var found=q.keyWords.filter(function(k){return low.indexOf(k.toLowerCase())!==-1;});
  var wc=state.writeVal.trim().split(/\s+/).length;
  state.writeDone=true; state.total++;
  var type,msg;
  if(wc<5){type='try';msg="Try writing more! Aim for 2-3 sentences. You can do it! \ud83d\udcdd";state.streak=0;}
  else if(found.length>=3){type='great';msg='\ud83c\udf1f Awesome! You used great key words like "'+found.slice(0,4).join('", "')+'". Nice thinking!';state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
  else if(found.length>=1){type='good';msg='Good start! You mentioned "'+found.join('", "')+'". Try adding more details! \ud83d\udca1';state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
  else{type='try';msg="Good effort! \ud83d\udcaa Try including more specific details. Check the hints!";state.streak=0;}
  state.writeFB={type:type,msg:msg};
  var short=state.writeVal.length>80?state.writeVal.substring(0,80)+'...':state.writeVal;
  state.answers.push({question:q.q,yourAnswer:'\ud83d\udcdd "'+short+'"',correctAnswer:null,correct:found.length>=1&&wc>=5});
  render();
  setTimeout(function(){var fb=document.querySelector('.w-fb');if(fb)fb.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

function nextQ() {
  if(state.qi<state.topic.questions.length-1){
    state.qi++; state.sel=null; state.showed=false;
    state.writeVal=''; state.writeDone=false; state.writeFB=null;
  } else {
    var pct=state.total>0?Math.round(state.score/state.total*100):0;
    var prev=state.scores[state.topic.id]||0;
    state.scores[state.topic.id]=Math.max(prev,pct);
    saveData();
    state.screen='results';
  }
  render(); window.scrollTo(0,0);
}

function goHome() {
  state.screen='home'; render(); window.scrollTo(0,0);
}

render();
}); // end DOMContentLoaded
</script>
