<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy - 5th Grade Social Studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  
  :root {
    --bg1: #FFECD2;
    --bg2: #FCB69F;
    --bg3: #FF9A9E;
    --card: rgba(255,255,255,0.88);
    --text: #2C3E50;
    --text-light: #666;
    --correct: #4CAF50;
    --correct-bg: #E8F5E9;
    --wrong: #EF5350;
    --wrong-bg: #FFEBEE;
    --warning: #FF9800;
    --warning-bg: #FFF3E0;
    --hint-bg: #FFF8E1;
    --hint-border: #FFC107;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Animations */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes starPop {
    0% { opacity: 1; transform: scale(0.5) translateY(0); }
    100% { opacity: 0; transform: scale(1.8) translateY(-60px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 5px rgba(255,200,0,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,200,0,0.6); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 44px;
    color: var(--text);
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
  }
  .header.small h1 { font-size: 28px; }
  .header p {
    color: #5D4037;
    font-size: 16px;
    font-weight: 600;
    margin-top: 6px;
  }

  /* Intro box */
  .intro-box {
    text-align: center;
    color: #4A4A4A;
    font-size: 15px;
    margin-bottom: 24px;
    background: rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 16px 20px;
    font-weight: 600;
    line-height: 1.6;
  }

  /* Topic cards */
  .topic-card {
    background: var(--card);
    border-radius: 20px;
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    margin-bottom: 12px;
    animation: slideUp 0.4s ease both;
  }
  .topic-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  }
  .topic-icon {
    font-size: 30px;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    flex-shrink: 0;
  }
  .topic-info { flex: 1; }
  .topic-name { font-weight: 800; font-size: 16px; }
  .topic-meta { font-size: 13px; color: #888; font-weight: 600; margin-top: 2px; }
  .topic-arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }

  /* Progress ring */
  .progress-ring-wrap {
    position: relative;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
  }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .progress-ring-text {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
  }

  /* Quiz screen */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: rgba(255,255,255,0.7);
    border: none;
    border-radius: 12px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    color: #666;
    font-family: inherit;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.95); }
  .progress-bar-wrap {
    flex: 1;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-count {
    font-size: 13px;
    font-weight: 700;
    color: #666;
  }

  .topic-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .question-card {
    background: var(--card);
    border-radius: 24px;
    padding: 26px 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    animation: slideUp 0.4s ease;
  }

  .q-type-badge {
    display: inline-block;
    color: white;
    padding: 3px 12px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 800;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    background: rgba(245,245,245,0.8);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    font-family: inherit;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(.locked) {
    transform: translateX(4px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .option-btn.locked { cursor: default; }
  .option-btn.correct-answer {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #2E7D32;
  }
  .option-btn.wrong-answer {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #C62828;
  }
  .option-letter {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  /* True/False */
  .tf-buttons {
    display: flex;
    gap: 14px;
  }
  .tf-btn {
    flex: 1;
    padding: 18px;
    border-radius: 18px;
    border: 3px solid #E0E0E0;
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    transition: all 0.2s;
    text-align: center;
  }
  .tf-btn:hover:not(.locked) {
    transform: scale(1.03);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .tf-btn.locked { cursor: default; }
  .tf-btn.correct-tf {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #2E7D32;
  }
  .tf-btn.wrong-tf {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #C62828;
  }

  /* Explanation */
  .explanation-box {
    margin-top: 16px;
    padding: 16px 18px;
    border-radius: 16px;
    animation: slideUp 0.3s ease;
    line-height: 1.6;
  }
  .explanation-box.correct {
    background: var(--correct-bg);
    border: 2px solid var(--correct);
  }
  .explanation-box.incorrect {
    background: var(--warning-bg);
    border: 2px solid var(--warning);
  }
  .explanation-title {
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .explanation-text {
    font-size: 14px;
    color: #444;
    font-weight: 600;
  }

  /* Fun fact */
  .fun-fact {
    margin-top: 10px;
    padding: 10px 14px;
    background: #F3E5F5;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #6A1B9A;
    border-left: 4px solid #AB47BC;
  }

  /* Writing */
  .hints-box {
    background: var(--hint-bg);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 14px;
    border-left: 4px solid var(--hint-border);
  }
  .hints-title {
    font-weight: 800;
    font-size: 13px;
    color: #F57F17;
    margin-bottom: 6px;
  }
  .hint-item {
    font-size: 13px;
    color: #795548;
    margin-bottom: 3px;
    font-weight: 600;
  }
  .write-area {
    width: 100%;
    min-height: 130px;
    border-radius: 16px;
    border: 2px solid #E0E0E0;
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    resize: vertical;
    color: #333;
    line-height: 1.6;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .write-area:focus {
    outline: none;
    border-color: #FF6B6B;
    box-shadow: 0 0 0 3px rgba(255,107,107,0.2);
  }
  .write-area:disabled { background: #F5F5F5; }

  .word-count {
    text-align: right;
    font-size: 12px;
    color: #999;
    font-weight: 600;
    margin-top: 4px;
  }

  .write-feedback {
    margin-top: 14px;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    animation: slideUp 0.3s ease;
    line-height: 1.5;
  }
  .write-feedback.great { background: var(--correct-bg); border: 2px solid var(--correct); }
  .write-feedback.good { background: var(--hint-bg); border: 2px solid var(--hint-border); }
  .write-feedback.try { background: var(--warning-bg); border: 2px solid var(--warning); }

  /* Buttons */
  .submit-btn {
    margin-top: 12px;
    border: none;
    border-radius: 14px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    color: white;
    transition: all 0.2s;
  }
  .submit-btn:disabled { background: #ccc !important; cursor: default; }
  .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

  .next-btn {
    margin-top: 18px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    animation: pulse 2s infinite;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }

  .score-tracker {
    margin-top: 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }

  /* Results */
  .results-card {
    text-align: center;
    background: var(--card);
    border-radius: 28px;
    padding: 36px 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    animation: pop 0.5s ease;
  }
  .results-emoji {
    font-size: 64px;
    margin-bottom: 12px;
    animation: float 2s ease-in-out infinite;
  }
  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    margin-bottom: 8px;
  }
  .results-topic {
    font-size: 16px;
    color: #666;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .results-ring {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 20px;
  }
  .results-ring-pct {
    position: absolute;
    font-size: 26px;
    font-weight: 900;
  }
  .results-score {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .results-msg {
    font-size: 14px;
    color: #888;
    font-weight: 600;
    margin-bottom: 28px;
  }
  .results-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .result-btn {
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .result-btn:hover { transform: translateY(-2px); }
  .result-btn.primary { color: white; }
  .result-btn.secondary { background: rgba(0,0,0,0.06); color: #555; }

  /* Confetti */
  .confetti-wrap {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    pointer-events: none;
    z-index: 998;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -5%;
  }

  /* Star bursts */
  .star-burst {
    position: fixed;
    pointer-events: none;
    z-index: 999;
  }
  .star-burst span {
    position: absolute;
    font-size: 20px;
  }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
  }

  /* Review mode */
  .review-item {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 10px;
    animation: slideIn 0.3s ease both;
  }
  .review-q {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .review-a {
    font-size: 13px;
    color: #555;
    font-weight: 600;
  }
  .review-status {
    font-size: 12px;
    font-weight: 800;
    margin-top: 4px;
  }

  /* Streak display */
  .streak-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .streak-fire { animation: pulse 1s infinite; display: inline-block; }

  @media (max-width: 480px) {
    .header h1 { font-size: 34px; }
    .header.small h1 { font-size: 24px; }
    .question-text { font-size: 16px; }
    .results-title { font-size: 24px; }
    .tf-buttons { gap: 10px; }
    .tf-btn { padding: 14px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
"use strict";
document.addEventListener('DOMContentLoaded', function() {
// ============================================================
// QUESTION DATA - Comprehensive 5th Grade Social Studies
// ============================================================
var TOPICS = [
  {
    id: "iron-curtain",
    name: "The Iron Curtain",
    emoji: "🪫",
    color: "#E74C3C",
    questions: [
      {
        type: "multiple",
        q: "What did the term 'Iron Curtain' describe?",
        options: [
          "A real curtain made of iron in Europe",
          "The invisible boundary dividing communist Eastern Europe from democratic Western Europe",
          "A new type of weapon used in World War II",
          "A wall built around the United States"
        ],
        answer: 1,
        explanation: "The 'Iron Curtain' was a term used to describe the invisible line that separated communist countries in Eastern Europe (controlled by the Soviet Union) from the democratic countries in Western Europe.",
        funFact: "The Iron Curtain wasn't a real physical barrier at first — it was an idea! But later, real fences and walls WERE built along parts of it."
      },
      {
        type: "multiple",
        q: "Who first made the term 'Iron Curtain' famous in a speech?",
        options: [
          "President Harry Truman",
          "Joseph Stalin",
          "Winston Churchill",
          "President Eisenhower"
        ],
        answer: 2,
        explanation: "Winston Churchill, the former Prime Minister of Britain, used the term 'Iron Curtain' in a famous 1946 speech to warn the world about the Soviet Union's control over Eastern Europe.",
        funFact: "Churchill gave this speech in Fulton, Missouri — a tiny town in the middle of America! President Truman invited him."
      },
      {
        type: "tf",
        q: "The Iron Curtain was a physical wall that stretched across all of Europe.",
        answer: false,
        explanation: "The Iron Curtain was NOT a real wall (at least not at first). It was a term used to describe the political and ideological divide between the communist East and democratic West in Europe. However, borders were heavily guarded and some physical barriers like the Berlin Wall were eventually built."
      },
      {
        type: "tf",
        q: "Countries behind the Iron Curtain were controlled or heavily influenced by the Soviet Union.",
        answer: true,
        explanation: "Yes! Countries like Poland, East Germany, Czechoslovakia, Hungary, Romania, and Bulgaria were behind the Iron Curtain and under Soviet control. People in these countries had very limited freedoms."
      },
      {
        type: "multiple",
        q: "What were the two sides of the Cold War?",
        options: [
          "The United States vs. Great Britain",
          "The United States and its allies (the West) vs. the Soviet Union and its allies (the East)",
          "North America vs. South America",
          "Europe vs. Asia"
        ],
        answer: 1,
        explanation: "The Cold War was between the United States and its democratic allies (called 'the West') and the Soviet Union and its communist allies (called 'the East'). It was called 'cold' because they never fought each other directly in a full-scale war."
      },
      {
        type: "multiple",
        q: "Why was the Cold War called 'cold'?",
        options: [
          "It was fought in cold places like Siberia",
          "The two sides threatened each other but never fought directly in an all-out war",
          "It happened during winter",
          "The weapons used were very cold"
        ],
        answer: 1,
        explanation: "It was called the 'Cold' War because the U.S. and Soviet Union never fought each other directly with their armies. Instead, they competed through threats, spying, the arms race, space race, and smaller conflicts in other countries."
      },
      {
        type: "tf",
        q: "The Cold War started right after World War II ended.",
        answer: true,
        explanation: "Yes! After World War II ended in 1945, the U.S. and the Soviet Union — who had been allies against Nazi Germany — quickly became rivals. By 1947, the Cold War was clearly underway."
      },
      {
        type: "write",
        q: "In your own words, explain what the 'Iron Curtain' was and why it was important during the Cold War.",
        hints: [
          "Think about: What two sides did it separate?",
          "What kind of governments were on each side?",
          "Why were people worried about it?",
          "Who made the term famous?"
        ],
        keyWords: ["communist", "democratic", "Europe", "Soviet", "separate", "divide", "Churchill", "freedom", "control", "West", "East"]
      }
    ]
  },
  {
    id: "stopping-communism",
    name: "Stopping Communism",
    emoji: "✈️",
    color: "#3498DB",
    questions: [
      {
        type: "multiple",
        q: "Why did the United States organize the Berlin Airlift?",
        options: [
          "To send soldiers to fight in Berlin",
          "To fly food and supplies to people in West Berlin when the Soviet Union blocked all roads",
          "To help people escape from East Berlin",
          "To drop leaflets over the Soviet Union"
        ],
        answer: 1,
        explanation: "When the Soviet Union blocked all roads and trains into West Berlin in 1948, the U.S. and its allies flew planes full of food, fuel, and supplies to the people there. This lasted almost a year!",
        funFact: "During the Berlin Airlift, planes landed in West Berlin every 3 minutes! One pilot even dropped candy with tiny parachutes for the kids — he became known as the 'Candy Bomber'! 🍬"
      },
      {
        type: "multiple",
        q: "What was the Korean War about?",
        options: [
          "North Korea (communist) invaded South Korea, and the U.S. helped defend South Korea",
          "South Korea attacked the United States",
          "Korea wanted to take over Japan",
          "The U.S. wanted to make Korea a state"
        ],
        answer: 0,
        explanation: "In 1950, communist North Korea invaded South Korea. The United States and other countries sent troops to help South Korea fight back and stop communism from spreading.",
        funFact: "The Korean War is sometimes called 'The Forgotten War' because it happened between WWII and Vietnam and many people don't know much about it."
      },
      {
        type: "multiple",
        q: "What is NATO (North Atlantic Treaty Organization)?",
        options: [
          "A space exploration group",
          "A group of countries that agreed to protect each other if attacked",
          "A trade agreement between the U.S. and Russia",
          "A United Nations club for kids"
        ],
        answer: 1,
        explanation: "NATO was created in 1949. Countries in North America and Europe agreed that if one member was attacked, all the others would help defend it. It was meant to stop the Soviet Union from expanding."
      },
      {
        type: "tf",
        q: "During the Berlin Airlift, the U.S. used ships to deliver supplies to West Berlin.",
        answer: false,
        explanation: "No — the Soviets had blocked all roads, rail lines, and waterways into West Berlin! That's why the U.S. and allies had to use AIRPLANES to fly supplies over the blockade. That's why it's called an 'airlift'!"
      },
      {
        type: "tf",
        q: "NATO was created so that countries could protect each other from attack.",
        answer: true,
        explanation: "Correct! NATO's main idea was 'collective defense' — an attack on one member country is treated as an attack on ALL member countries. This was meant to discourage the Soviet Union from attacking any NATO country."
      },

// ============================================================
// APP STATE
// ============================================================
var state = {
  screen: 'home',
  currentTopic: null,
  currentQ: 0,
  selected: null,
  showResult: false,
  score: 0,
  total: 0,
  writeAnswer: '',
  writeSubmitted: false,
  writeFeedback: null,
  topicScores: {},
  streak: 0,
  bestStreak: 0,
  answers: [] // track answers for review
};

// Try to load saved scores from localStorage
try {
  const saved = localStorage.getItem('studyBuddyScores');
  if (saved) {
    const parsed = JSON.parse(saved);
    state.topicScores = parsed.topicScores || {};
    state.bestStreak = parsed.bestStreak || 0;
  }
} catch(e) {}

function saveScores() {
  try {
    localStorage.setItem('studyBuddyScores', JSON.stringify({
      topicScores: state.topicScores,
      bestStreak: state.bestStreak
    }));
  } catch(e) {}
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  const app = document.getElementById('app');
  
  if (state.screen === 'home') {
    app.innerHTML = renderHome();
  } else if (state.screen === 'quiz') {
    app.innerHTML = renderQuiz();
  } else if (state.screen === 'results') {
    app.innerHTML = renderResults();
  }
  
  attachEvents();
}

function progressRingSVG(percent, size, color) {
  const r = (size - 6) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e0e0e0" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      style="transition:stroke-dashoffset 0.6s ease"/>
  </svg>`;
}

function renderHome() {
  const totalQuestions = TOPICS.reduce((sum, t) => sum + t.questions.length, 0);
  const topicCards = TOPICS.map((topic, i) => {
    const best = state.topicScores[topic.id];
    const mcCount = topic.questions.filter(q => q.type === 'multiple').length;
    const tfCount = topic.questions.filter(q => q.type === 'tf').length;
    const wCount = topic.questions.filter(q => q.type === 'write').length;
    const scoreHTML = best !== undefined
      ? `<div class="progress-ring-wrap">
          ${progressRingSVG(best, 48, topic.color)}
          <div class="progress-ring-text" style="color:${topic.color}">${best}%</div>
        </div>`
      : '';
    return `<div class="topic-card" data-topic="${i}" style="border-left:5px solid ${topic.color};animation-delay:${i*0.07}s">
      <div class="topic-icon" style="background:${topic.color}18">${topic.emoji}</div>
      <div class="topic-info">
        <div class="topic-name">${topic.name}</div>
        <div class="topic-meta">${topic.questions.length} questions · ${mcCount} quiz · ${tfCount} T/F · ${wCount} writing</div>
      </div>
      ${scoreHTML}
      <div class="topic-arrow">→</div>
    </div>`;
  }).join('');

  return `
    <div class="header">
      <h1>📚 Study Buddy</h1>
      <p>5th Grade Social Studies ✨</p>
    </div>
    <div class="intro-box">
      Pick a topic to start learning! There are <strong>${totalQuestions} questions</strong> across ${TOPICS.length} topics — 
      quiz questions, true/false, and writing practice. Your best scores are saved! 🎯
      ${state.bestStreak > 0 ? `<br>🔥 Best streak: <strong>${state.bestStreak} in a row!</strong>` : ''}
    </div>
    ${topicCards}
    <div class="footer">Made with ❤️ for studying · Your scores are saved automatically</div>
  `;
}

function renderQuiz() {
  const topic = state.currentTopic;
  const q = topic.questions[state.currentQ];
  const progress = ((state.currentQ + 1) / topic.questions.length) * 100;
  
  let questionContent = '';
  
  if (q.type === 'multiple') {
    questionContent = renderMultipleChoice(q, topic);
  } else if (q.type === 'tf') {
    questionContent = renderTrueFalse(q, topic);
  } else if (q.type === 'write') {
    questionContent = renderWriting(q, topic);
  }

  const streakHTML = state.streak >= 2 
    ? `<div class="streak-bar"><span class="streak-fire">🔥</span> ${state.streak} in a row!</div>` 
    : '';

  return `
    <div class="header small"><h1>📚 Study Buddy</h1></div>
    <div class="nav-bar" style="animation:slideUp 0.3s ease">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${progress}%;background:${topic.color}"></div>
      </div>
      <span class="progress-count">${state.currentQ + 1}/${topic.questions.length}</span>
    </div>
    <div class="topic-badge" style="background:${topic.color}20;color:${topic.color};animation:slideUp 0.3s ease">
      ${topic.emoji} ${topic.name}
    </div>
    <div class="question-card">
      <div class="q-type-badge" style="background:${q.type === 'write' ? '#FF6B6B' : q.type === 'tf' ? '#FF9800' : topic.color}">
        ${q.type === 'write' ? '✏️ Writing' : q.type === 'tf' ? '⚡ True or False' : '🧠 Quiz'}
      </div>
      <div class="question-text">${q.q}</div>
      ${questionContent}
    </div>
    <div class="score-tracker">
      Score: ${state.score}/${state.total} ${'⭐'.repeat(Math.min(state.score, 8))}
      ${streakHTML}
    </div>
  `;
}

function renderMultipleChoice(q, topic) {
  const letters = ['A', 'B', 'C', 'D'];
  const options = q.options.map((opt, i) => {
    let cls = 'option-btn';
    let letterBg = `${topic.color}20`;
    let letterColor = topic.color;
    let icon = letters[i];
    
    if (state.showResult) {
      cls += ' locked';
      if (i === q.answer) {
        cls += ' correct-answer';
        letterBg = '#4CAF50';
        letterColor = 'white';
        icon = '✓';
      } else if (i === state.selected) {
        cls += ' wrong-answer';
        letterBg = '#EF5350';
        letterColor = 'white';
        icon = '✗';
      }
    }
    
    return `<button class="${cls}" data-option="${i}">
      <span class="option-letter" style="background:${letterBg};color:${letterColor}">${icon}</span>
      ${opt}
    </button>`;
  }).join('');

  let explHTML = '';
  if (state.showResult) {
    const isCorrect = state.selected === q.answer;
    explHTML = `<div class="explanation-box ${isCorrect ? 'correct' : 'incorrect'}">
      <div class="explanation-title" style="color:${isCorrect ? '#2E7D32' : '#E65100'}">
        ${isCorrect ? '🎉 Correct!' : '❌ Not quite — but now you know!'}
      </div>
      <div class="explanation-text">${q.explanation}</div>
    </div>`;
    if (q.funFact) {
      explHTML += `<div class="fun-fact">🤓 <strong>Fun Fact:</strong> ${q.funFact}</div>`;
    }
    explHTML += `<button class="next-btn" id="nextBtn">${state.currentQ < state.currentTopic.questions.length - 1 ? 'Next Question →' : 'See My Results! 🏆'}</button>`;
  }

  return `<div class="options-list">${options}</div>${explHTML}`;
}

function renderTrueFalse(q, topic) {
  let trueClass = 'tf-btn';
  let falseClass = 'tf-btn';
  
  if (state.showResult) {
    trueClass += ' locked';
    falseClass += ' locked';
    if (q.answer === true) {
      trueClass += ' correct-tf';
      if (state.selected === false) falseClass += ' wrong-tf';
    } else {
      falseClass += ' correct-tf';
      if (state.selected === true) trueClass += ' wrong-tf';
    }
  }

  let explHTML = '';
  if (state.showResult) {
    const isCorrect = state.selected === q.answer;
    explHTML = `<div class="explanation-box ${isCorrect ? 'correct' : 'incorrect'}" style="margin-top:16px">
      <div class="explanation-title" style="color:${isCorrect ? '#2E7D32' : '#E65100'}">
        ${isCorrect ? '🎉 Correct!' : '❌ Not quite — but now you know!'}
      </div>
      <div class="explanation-text">${q.explanation}</div>
    </div>`;
    if (q.funFact) {
      explHTML += `<div class="fun-fact">🤓 <strong>Fun Fact:</strong> ${q.funFact}</div>`;
    }
    explHTML += `<button class="next-btn" id="nextBtn">${state.currentQ < state.currentTopic.questions.length - 1 ? 'Next Question →' : 'See My Results! 🏆'}</button>`;
  }

  return `<div class="tf-buttons">
    <button class="${trueClass}" data-tf="true">✅ TRUE</button>
    <button class="${falseClass}" data-tf="false">❌ FALSE</button>
  </div>${explHTML}`;
}

function renderWriting(q, topic) {
  const wordCount = state.writeAnswer.trim() ? state.writeAnswer.trim().split(/\s+/).length : 0;
  
  const hints = q.hints.map(h => `<div class="hint-item">• ${h}</div>`).join('');
  
  let feedbackHTML = '';
  if (state.writeFeedback) {
    feedbackHTML = `<div class="write-feedback ${state.writeFeedback.type}">${state.writeFeedback.msg}</div>`;
  }
  
  let btnHTML = '';
  if (!state.writeSubmitted) {
    btnHTML = `<button class="submit-btn" id="checkWriteBtn" style="background:${state.writeAnswer.trim().length === 0 ? '#ccc' : topic.color}" ${state.writeAnswer.trim().length === 0 ? 'disabled' : ''}>Check My Answer ✏️</button>`;
  }

  let nextHTML = '';
  if (state.writeSubmitted) {
    nextHTML = `<button class="next-btn" id="nextBtn">${state.currentQ < state.currentTopic.questions.length - 1 ? 'Next Question →' : 'See My Results! 🏆'}</button>`;
  }

  return `
    <div class="hints-box">
      <div class="hints-title">💡 Hints to help you:</div>
      ${hints}
    </div>
    <textarea class="write-area" id="writeArea" placeholder="Type your answer here... Try to write at least 2-3 sentences!" ${state.writeSubmitted ? 'disabled' : ''}>${state.writeAnswer}</textarea>
    <div class="word-count">${wordCount} word${wordCount !== 1 ? 's' : ''}</div>
    ${btnHTML}
    ${feedbackHTML}
    ${nextHTML}
  `;
}

function renderResults() {
  const topic = state.currentTopic;
  const pct = state.total > 0 ? Math.round((state.score / state.total) * 100) : 0;
  
  let emoji, title, msg;
  if (pct >= 90) {
    emoji = '🏆'; title = 'AMAZING Job!'; msg = "You're a Social Studies superstar! 🌟";
  } else if (pct >= 70) {
    emoji = '⭐'; title = 'Great Work!'; msg = "You really know your stuff! Keep it up! 💪";
  } else if (pct >= 50) {
    emoji = '📖'; title = 'Good Effort!'; msg = "You're getting there! Try again to improve! 💡";
  } else {
    emoji = '🌱'; title = 'Keep Learning!'; msg = "Practice makes perfect — give it another shot! 📚";
  }

  // Build review section
  let reviewHTML = '<div style="text-align:left;margin-top:24px">';
  reviewHTML += '<h3 style="font-size:16px;margin-bottom:12px;color:#555">📋 Review Your Answers:</h3>';
  state.answers.forEach((a, i) => {
    const icon = a.correct ? '✅' : '❌';
    const borderColor = a.correct ? '#4CAF50' : '#EF5350';
    reviewHTML += `<div class="review-item" style="border-left:4px solid ${borderColor};animation-delay:${i*0.05}s">
      <div class="review-q">${icon} ${a.question}</div>
      <div class="review-a">${a.yourAnswer}</div>
      ${!a.correct && a.correctAnswer ? `<div class="review-status" style="color:#4CAF50">✓ Correct answer: ${a.correctAnswer}</div>` : ''}
    </div>`;
  });
  reviewHTML += '</div>';

  const confettiHTML = pct >= 70 ? renderConfetti() : '';

  return `
    ${confettiHTML}
    <div class="header small"><h1>📚 Study Buddy</h1></div>
    <div class="results-card">
      <div class="results-emoji">${emoji}</div>
      <div class="results-title">${title}</div>
      <div class="results-topic">${topic.emoji} ${topic.name}</div>
      <div class="results-ring">
        ${progressRingSVG(pct, 110, topic.color)}
        <div class="results-ring-pct" style="color:${topic.color}">${pct}%</div>
      </div>
      <div class="results-score">You got <strong>${state.score}</strong> out of <strong>${state.total}</strong> right!</div>
      ${state.bestStreak > 0 ? `<div style="font-size:14px;color:#F39C12;font-weight:700;margin-bottom:8px">🔥 Best streak this session: ${state.bestStreak} in a row!</div>` : ''}
      <div class="results-msg">${msg}</div>
      <div class="results-buttons">
        <button class="result-btn primary" id="retryBtn" style="background:${topic.color}">Try Again 🔄</button>
        <button class="result-btn secondary" id="homeBtn">All Topics 📚</button>
      </div>
      ${reviewHTML}
    </div>
    <div class="footer">Made with ❤️ for studying</div>
  `;
}

function renderConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE'];
  let pieces = '';
  for (let i = 0; i < 40; i++) {
    const color = colors[i % 7];
    const left = Math.random() * 100;
    const delay = Math.random() * 2;
    const dur = 2 + Math.random() * 3;
    const radius = Math.random() > 0.5 ? '50%' : '2px';
    pieces += `<div class="confetti-piece" style="left:${left}%;background:${color};border-radius:${radius};animation:confettiFall ${dur}s linear ${delay}s forwards"></div>`;
  }
  return `<div class="confetti-wrap">${pieces}</div>`;
}

// ============================================================
// EVENT HANDLING
// ============================================================
function attachEvents() {
  // Topic cards
  document.querySelectorAll('.topic-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.topic);
      startTopic(TOPICS[idx]);
    });
  });

  // Back button
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', goHome);

  // Multiple choice options
  document.querySelectorAll('.option-btn:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.showResult) return;
      const idx = parseInt(btn.dataset.option);
      handleMultipleSelect(idx);
    });
  });

  // True/False buttons
  document.querySelectorAll('.tf-btn:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.showResult) return;
      const val = btn.dataset.tf === 'true';
      handleTFSelect(val);
    });
  });

  // Write area
  const writeArea = document.getElementById('writeArea');
  if (writeArea) {
    writeArea.addEventListener('input', (e) => {
      state.writeAnswer = e.target.value;
      // Update word count and button state
      const wordCount = state.writeAnswer.trim() ? state.writeAnswer.trim().split(/\s+/).length : 0;
      const wc = document.querySelector('.word-count');
      if (wc) wc.textContent = `${wordCount} word${wordCount !== 1 ? 's' : ''}`;
      const checkBtn = document.getElementById('checkWriteBtn');
      if (checkBtn) {
        checkBtn.disabled = state.writeAnswer.trim().length === 0;
        checkBtn.style.background = state.writeAnswer.trim().length === 0 ? '#ccc' : state.currentTopic.color;
      }
    });
  }

  // Check writing button
  const checkBtn = document.getElementById('checkWriteBtn');
  if (checkBtn) checkBtn.addEventListener('click', checkWriting);

  // Next button
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.addEventListener('click', nextQuestion);

  // Results buttons
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', () => startTopic(state.currentTopic));
  
  const homeBtn = document.getElementById('homeBtn');
  if (homeBtn) homeBtn.addEventListener('click', goHome);
}

// ============================================================
// GAME LOGIC
// ============================================================
function startTopic(topic) {
  state.currentTopic = topic;
  state.currentQ = 0;
  state.selected = null;
  state.showResult = false;
  state.score = 0;
  state.total = 0;
  state.writeAnswer = '';
  state.writeSubmitted = false;
  state.writeFeedback = null;
  state.streak = 0;
  state.answers = [];
  state.screen = 'quiz';
  render();
}

function handleMultipleSelect(idx) {
  const q = state.currentTopic.questions[state.currentQ];
  state.selected = idx;
  state.showResult = true;
  state.total++;
  
  const correct = idx === q.answer;
  if (correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
  }

  state.answers.push({
    question: q.q,
    yourAnswer: correct ? `✓ ${q.options[idx]}` : `✗ ${q.options[idx]}`,
    correctAnswer: correct ? null : q.options[q.answer],
    correct
  });

  render();
}

function handleTFSelect(val) {
  const q = state.currentTopic.questions[state.currentQ];
  state.selected = val;
  state.showResult = true;
  state.total++;
  
  const correct = val === q.answer;
  if (correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
  }

  state.answers.push({
    question: q.q,
    yourAnswer: correct ? `✓ ${val ? 'True' : 'False'}` : `✗ ${val ? 'True' : 'False'}`,
    correctAnswer: correct ? null : (q.answer ? 'True' : 'False'),
    correct
  });

  render();
}

function checkWriting() {
  const q = state.currentTopic.questions[state.currentQ];
  const lower = state.writeAnswer.toLowerCase();
  const found = q.keyWords.filter(kw => lower.includes(kw.toLowerCase()));
  const wordCount = state.writeAnswer.trim().split(/\s+/).length;
  
  state.writeSubmitted = true;
  state.total++;

  let type, msg;
  if (wordCount < 5) {
    type = 'try';
    msg = "Try writing a little more! Aim for at least 2-3 sentences. You can do it! 📝";
    state.streak = 0;
  } else if (found.length >= 3) {
    type = 'great';
    msg = `Awesome job! 🌟 You included great key words like "${found.slice(0, 4).join('", "')}"! Your answer shows really good understanding!`;
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else if (found.length >= 1) {
    type = 'good';
    msg = `Good start! You mentioned "${found.join('", "')}" which is great. Try to add more specific details — check the hints for ideas! 💡`;
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    type = 'try';
    msg = "Good effort writing! 💪 Try to include more specific details about the topic. Look at the hints and use words from the question to make your answer stronger.";
    state.streak = 0;
  }

  state.writeFeedback = { type, msg };
  state.answers.push({
    question: q.q,
    yourAnswer: `📝 "${state.writeAnswer.substring(0, 80)}${state.writeAnswer.length > 80 ? '...' : ''}"`,
    correctAnswer: null,
    correct: found.length >= 1 && wordCount >= 5
  });

  render();
  
  // Scroll to feedback
  setTimeout(() => {
    const fb = document.querySelector('.write-feedback');
    if (fb) fb.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function nextQuestion() {
  if (state.currentQ < state.currentTopic.questions.length - 1) {
    state.currentQ++;
    state.selected = null;
    state.showResult = false;
    state.writeAnswer = '';
    state.writeSubmitted = false;
    state.writeFeedback = null;
    state.screen = 'quiz';
  } else {
    const pct = state.total > 0 ? Math.round((state.score / state.total) * 100) : 0;
    const prev = state.topicScores[state.currentTopic.id] || 0;
    state.topicScores[state.currentTopic.id] = Math.max(prev, pct);
    saveScores();
    state.screen = 'results';
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  state.screen = 'home';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initial render
render();
}); // end DOMContentLoaded
</script>
