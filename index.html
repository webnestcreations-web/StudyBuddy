/* ===== SS LOGIC ===== */
function startSSTopic(t){t.questions.forEach(function(q){if(q.type==='multiple')q._sh=false;});state.topic=t;state.qi=0;state.sel=null;state.showed=false;state.score=0;state.total=0;state.writeVal='';state.writeDone=false;state.writeFB=null;state.streak=0;state.answers=[];state.matchSels={};state.matchChecked=false;state.fibVal='';state.fibVal2='';state.fibDone=false;state.fibFB=null;state.screen='quiz';logDay();render();window.scrollTo(0,0);}
function ssPickMC(i){var q=state.topic.questions[state.qi];state.sel=i;state.showed=true;state.total++;var c=i===q.answer;if(c){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}else state.streak=0;state.answers.push({question:q.q,yourAnswer:(c?'\u2713 ':'\u2717 ')+q.options[i],correctAnswer:c?null:q.options[q.answer],correct:c});render();}
function ssPickTF(v){var q=state.topic.questions[state.qi];state.sel=v;state.showed=true;state.total++;var c=v===q.answer;if(c){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}else state.streak=0;state.answers.push({question:q.q,yourAnswer:(c?'\u2713 ':'\u2717 ')+(v?'True':'False'),correctAnswer:c?null:(q.answer?'True':'False'),correct:c});render();}
function ssCheckFIB(){var q=state.topic.questions[state.qi];state.fibDone=true;state.total++;var correct=false;var typoNote=null;if(q.multi){var r1=fuzzyMatch(state.fibVal,[q.answer[0]]),r2=fuzzyMatch(state.fibVal2||"",[q.answer[1]]);if(!r1.match||!r2.match){r1=fuzzyMatch(state.fibVal,[q.answer[1]]);r2=fuzzyMatch(state.fibVal2||"",[q.answer[0]]);}correct=r1.match&&r2.match;}else{var r=fuzzyMatch(state.fibVal,q.answer);correct=r.match;if(correct&&!r.exact)typoNote=q.answer[0];}if(correct){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;var fmsg='\ud83c\udf89 Correct!';if(typoNote)fmsg+=' <span style="color:#888;font-size:11px">(Spelling: "'+typoNote+'")</span>';state.fibFB={type:'great',msg:fmsg};}else{state.streak=0;var ans=q.multi?q.answer[0]+' and '+q.answer[1]:q.answer[0];state.fibFB={type:'try',msg:'\u274c The answer was: <strong>'+ans+'</strong>'};}state.answers.push({question:q.q,yourAnswer:'\ud83d\udcdd "'+state.fibVal+'"',correctAnswer:correct?null:(q.multi?q.answer.join(' and '):q.answer[0]),correct:correct});render();}
function ssCheckMatch(){var q=state.topic.questions[state.qi];state.matchChecked=true;state.total++;var numC=q.pairs.filter(function(p,i){return state.matchSels[i]===p.right;}).length;var allC=numC===q.pairs.length;if(allC){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}else if(numC>=q.pairs.length/2){state.score++;state.streak=0;}else{state.streak=0;}state.answers.push({question:q.q,yourAnswer:numC+'/'+q.pairs.length+' matched',correctAnswer:allC?null:'See explanation',correct:allC});render();}
function ssCheckWrite(){var q=state.topic.questions[state.qi];var low=state.writeVal.toLowerCase();var found=q.keyWords.filter(function(k){return low.indexOf(k.toLowerCase())!==-1;});var wc=state.writeVal.trim().split(/\s+/).length;state.writeDone=true;state.total++;var type,msg;if(wc<8){type='try';msg="Too short! Aim for 3-5 sentences. \ud83d\udcdd";state.streak=0;}else if(found.length>=4){type='great';msg='\ud83c\udf1f Excellent! Key concepts: "'+found.slice(0,5).join('", "')+'".';state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}else if(found.length>=2){type='good';msg='Good! You mentioned "'+found.join('", "')+'". Go deeper! \ud83d\udca1';state.score++;state.streak++;}else{type='try';msg="Keep going! Include more details. \ud83d\udcaa";state.streak=0;}state.writeFB={type:type,msg:msg};state.answers.push({question:q.q,yourAnswer:'\ud83d\udcdd "'+state.writeVal.substring(0,60)+'..."',correctAnswer:null,correct:found.length>=2&&wc>=8});render();}
function ssNext(){if(state.qi<state.topic.questions.length-1){state.qi++;state.sel=null;state.showed=false;state.writeVal='';state.writeDone=false;state.writeFB=null;state.matchSels={};state.matchChecked=false;state.fibVal='';state.fibVal2='';state.fibDone=false;state.fibFB=null;}else{var p=state.total>0?Math.round(state.score/state.total*100):0;state.ss_scores[state.topic.id]=Math.max(state.ss_scores[state.topic.id]||0,p);saveData();state.screen='results';}render();window.scrollTo(0,0);}

function startMathTopic(t){t.lessons.forEach(function(l){if(l.type==='mc')l._sh=false;});state.topic=t;state.step=0;state.sel=null;state.showed=false;state.score=0;state.total=0;state.streak=0;state.answers=[];state.screen='lesson';logDay();render();window.scrollTo(0,0);}
function mathPickMC(i){var step=state.topic.lessons[state.step];state.sel=i;state.showed=true;state.total++;var c=i===step.answer;if(c){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}else state.streak=0;render();}
function mathNext(){if(state.step<state.topic.lessons.length-1){state.step++;state.sel=null;state.showed=false;}else{var p=state.total>0?Math.round(state.score/state.total*100):0;state.math_scores[state.topic.id]=Math.max(state.math_scores[state.topic.id]||0,p);saveData();state.screen='results';}render();window.scrollTo(0,0);}

/* === BREATHING TOOL === */
function renderBreathe(){
  var phases=['rest','inhale','hold','exhale'];
  var labels={rest:'Get Ready...',inhale:'Breathe In...',hold:'Hold...',exhale:'Breathe Out...'};
  var p=state.breathePhase||'rest';
  var h='<div class="well-card" style="text-align:center">';
  h+='<div class="well-title">\ud83c\udf2c\uFE0F Breathing Buddy</div>';
  h+='<div class="well-text">Breathe with the circle. In through your nose, out through your mouth. Let\'s do this together!</div>';
  h+='<div class="breathe-circle '+p+'" id="breatheCircle">'+labels[p]+'</div>';
  h+='<div style="font-size:13px;font-weight:700;color:#666;margin:10px 0">Breaths completed: '+state.breatheCount+'</div>';
  if(!state.breatheTimer){
    h+='<button class="nbtn" id="startBreathe" style="background:linear-gradient(135deg,#7C4DFF,#B388FF)">Start Breathing \ud83c\udf2c\uFE0F</button>';
  } else {
    h+='<button class="nbtn" id="stopBreathe" style="background:#EF5350">Stop</button>';
  }
  if(state.breatheCount>=3){
    h+='<div class="encourage" style="margin-top:14px">\ud83c\udf1f Great job! '+state.breatheCount+' breaths done. You should be feeling a bit calmer now.</div>';
  }
  h+='</div>';
  return h;
}

function startBreathing(){
  state.breatheCount=0;
  state.breathePhase='inhale';
  render();
  var cycle=['inhale','hold','exhale','rest'];
  var durations=[4000,4000,4000,2000]; // 4-4-4-2 pattern
  var step=0;
  function nextPhase(){
    state.breathePhase=cycle[step%4];
    if(cycle[step%4]==='rest' && step>0) state.breatheCount++;
    var circle=el('breatheCircle');
    if(circle){
      circle.className='breathe-circle '+state.breathePhase;
      var labels={rest:'Get Ready...',inhale:'Breathe In...',hold:'Hold...',exhale:'Breathe Out...'};
      circle.textContent=labels[state.breathePhase];
    }
    var countEl=document.querySelector('.well-card div[style*="Breaths completed"]');
    if(countEl) countEl.textContent='Breaths completed: '+state.breatheCount;
    if(state.breatheCount>=3){render();} // Re-render for congrats
    step++;
    state.breatheTimer=setTimeout(nextPhase,durations[(step-1)%4]);
  }
  nextPhase();
}

function stopBreathing(){
  if(state.breatheTimer){clearTimeout(state.breatheTimer);state.breatheTimer=null;}
  state.breathePhase='rest';
  render();
}

  h+='<div class="well-title">\ud83d\udcd3 Feelings Journal</div>';
  h+='<div class="well-text">Writing about your feelings helps your brain process them. It\'s like talking to a friend, but the friend is the page. \ud83d\udcdd</div>';

  h+='<div class="journal-prompt" style="margin-bottom:14px">\ud83c\udfaf Today\'s prompt:<br><strong>'+prompts[promptIdx]+'</strong></div>';

  h+='<textarea class="dump-area" id="journalInput" placeholder="Write your thoughts here... nobody will see this but you."'+(state.journalSaved?' disabled':'')+'>'+state.journalText+'</textarea>';
  var wc=state.journalText.trim()?state.journalText.trim().split(/\\s+/).length:0;
  h+='<div style="text-align:right;font-size:11px;color:#999;font-weight:600;margin-top:4px">'+wc+' words</div>';

  if(!state.journalSaved && wc>=3){
    h+='<div class="encourage">\ud83c\udf1f Great job writing about your feelings! That takes courage. \ud83d\udc9c</div>';
  }

  h+='<div class="well-text" style="font-size:11px;color:#aaa;margin-top:14px">\ud83d\udd12 Your journal is private. Nothing is saved or shared \u2014 when you leave, it disappears.</div>';
  h+='</div>';
  return h;
}

/* === WELLNESS EVENT BINDING === */
function wellBind(){
  // Mood cards
  qs('[data-mood]').forEach(function(c){c.addEventListener('click',function(){
    var m=MOODS[parseInt(c.dataset.mood)];
    state.wellMood=m.id;
    state.wellScreen='tools';
    // Log mood
    state.moodLog.push({mood:m.id,date:new Date().toLocaleDateString()});
    if(state.moodLog.length>30) state.moodLog=state.moodLog.slice(-30);
    saveData();
    render();window.scrollTo(0,0);
  });});

  // Well back buttons
  var wb=el('wellBack');if(wb)wb.addEventListener('click',function(){state.wellScreen='moods';state.wellMood=null;render();});
  var wbt=el('wellBackTools');if(wbt)wbt.addEventListener('click',function(){
    state.wellScreen='tools';state.wellTool=null;
    // Reset tool states
    stopBreathing();state.breatheCount=0;state.breathePhase='rest';
    state.senseStep=0;state.senseInputs=['','','','',''];
    state.worryText='';state.worrySorted=null;
    state.dumpText='';state.chunks=[];state.chunksDone={};
    state.journalText='';state.journalSaved=false;
    render();window.scrollTo(0,0);
  });

  // Show all tools
  var sat=el('showAllTools');if(sat)sat.addEventListener('click',function(){
    // Show a mood that has all tools
    state.wellMood='calm';state.wellScreen='tools';render();
  });

  // Tool buttons
  qs('[data-tool]').forEach(function(b){b.addEventListener('click',function(){
    state.wellTool=b.dataset.tool;state.wellScreen='tool';
    // Reset specific tool state
    state.breatheCount=0;state.breathePhase='rest';if(state.breatheTimer){clearTimeout(state.breatheTimer);state.breatheTimer=null;}
    state.senseStep=0;state.senseInputs=['','','','',''];
    state.worryText='';state.worrySorted=null;
    state.dumpText='';state.chunks=[];state.chunksDone={};
    state.journalText='';state.journalSaved=false;
    render();window.scrollTo(0,0);
  });});

  // Breathing
  var sb=el('startBreathe');if(sb)sb.addEventListener('click',startBreathing);
  var stb=el('stopBreathe');if(stb)stb.addEventListener('click',stopBreathing);

  // Grounding
  var si=el('senseInput');if(si)si.addEventListener('input',function(){state.senseInputs[state.senseStep]=si.value;var btn=el('senseNext');if(btn)btn.disabled=!si.value.trim();});
  var sn=el('senseNext');if(sn)sn.addEventListener('click',function(){if(state.senseInputs[state.senseStep].trim()){state.senseStep++;render();window.scrollTo(0,0);}});
  var sr=el('senseReset');if(sr)sr.addEventListener('click',function(){state.senseStep=0;state.senseInputs=['','','','',''];render();});

  // Worry sorter
  var wi=el('worryInput');if(wi)wi.addEventListener('input',function(){state.worryText=wi.value;render();});
  qs('[data-sort]').forEach(function(b){b.addEventListener('click',function(){state.worrySorted=b.dataset.sort;render();});});

  // Brain dump
  var di=el('dumpInput');if(di)di.addEventListener('input',function(){state.dumpText=di.value;var wc=state.dumpText.trim()?state.dumpText.trim().split(/\s+/).length:0;var wcEl=di.nextElementSibling;if(wcEl)wcEl.textContent=wc+' words dumped';});

  // One Thing
  var ci=el('chunkInput');if(ci)ci.addEventListener('input',function(){state.dumpText=ci.value;render();});
  var mc=el('makeChunks');if(mc)mc.addEventListener('click',function(){
    var stepsEl=el('chunkSteps');
    if(stepsEl && stepsEl.value.trim()){
      state.chunks=stepsEl.value.trim().split('\n').filter(function(s){return s.trim();}).map(function(s){return s.trim();});
      state.chunksDone={};
      render();window.scrollTo(0,0);
    }
  });
  qs('[data-ci]').forEach(function(b){b.addEventListener('click',function(){
    var i=parseInt(b.dataset.ci);
    if(state.chunksDone[i]) delete state.chunksDone[i];
    else state.chunksDone[i]=true;
    render();
  });});
  var rc=el('resetChunks');if(rc)rc.addEventListener('click',function(){state.chunks=[];state.chunksDone={};state.dumpText='';render();});

  // Comfort
  var mcf=el('moreComfort');if(mcf)mcf.addEventListener('click',function(){render();});

  // Journal
  var ji=el('journalInput');if(ji)ji.addEventListener('input',function(){state.journalText=ji.value;var wc=state.journalText.trim()?state.journalText.trim().split(/\s+/).length:0;var wcEl=ji.nextElementSibling;if(wcEl)wcEl.textContent=wc+' words';});
}

render();
});
</script>
</body>
</html>
