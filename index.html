<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Study Buddy">
<title>Study Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--card:rgba(255,255,255,0.92);--text:#2C3E50;--correct:#4CAF50;--correct-bg:#E8F5E9;--wrong:#EF5350;--wrong-bg:#FFEBEE;--warning:#FF9800;--warning-bg:#FFF3E0;--hint-bg:#FFF8E1;--hint-border:#FFC107}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:-webkit-fill-available;font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body.ss-theme{background:linear-gradient(135deg,#FFECD2 0%,#FCB69F 50%,#FF9A9E 100%)}
body.math-theme{background:linear-gradient(135deg,#E0F7FA 0%,#80DEEA 50%,#4DD0E1 100%)}
body.home-theme{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 50%,#d299c2 100%)}
html{height:-webkit-fill-available}
.ctn{max-width:720px;margin:0 auto;padding:20px 16px 40px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

.hdr{text-align:center;margin-bottom:18px;animation:slideUp .4s ease}
.hdr h1{font-family:'Fredoka One',cursive;font-size:36px;color:var(--text);text-shadow:2px 2px 0 rgba(255,255,255,.5)}
.hdr.sm h1{font-size:22px}
.hdr p{color:#555;font-size:14px;font-weight:600;margin-top:3px}

/* Subject picker */
.subj-grid{display:flex;gap:14px;margin-bottom:20px;animation:slideUp .4s ease}
.subj-card{flex:1;background:var(--card);border-radius:20px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.subj-card:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(0,0,0,.12)}
.subj-card:active{transform:scale(.96)}
.subj-card .icon{font-size:48px;margin-bottom:8px}
.subj-card .name{font-weight:800;font-size:16px}
.subj-card .desc{font-size:11px;color:#888;font-weight:600;margin-top:3px}

.tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.4);border-radius:13px;padding:4px}
.tab{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;border:none;background:0 0;font-family:inherit;color:#888;transition:all .2s}
.tab.on{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}

.card{background:var(--card);border-radius:20px;padding:22px 20px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:12px;animation:slideUp .4s ease}
.intro{text-align:center;color:#4A4A4A;font-size:13px;margin-bottom:18px;background:rgba(255,255,255,.6);border-radius:15px;padding:13px 16px;font-weight:600;line-height:1.6}

/* Topic cards */
.tc{cursor:pointer;display:flex;align-items:center;gap:13px;transition:all .2s}
.tc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.1)}
.tc:active{transform:scale(.98)}
.ti{font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0}
.tn{font-weight:800;font-size:14px}
.tm{font-size:11px;color:#999;font-weight:600;margin-top:2px}
.td{font-size:11px;color:#777;font-weight:600;margin-top:2px;line-height:1.4}

.pr{position:relative;flex-shrink:0;width:42px;height:42px}
.pr svg{transform:rotate(-90deg);display:block}
.prt{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}

.nav{display:flex;align-items:center;gap:10px;margin-bottom:13px;animation:slideUp .3s ease}
.bk{background:rgba(255,255,255,.7);border:none;border-radius:10px;padding:7px 12px;cursor:pointer;font-weight:700;font-size:12px;color:#666;font-family:inherit}
.pgw{flex:1;background:rgba(255,255,255,.5);border-radius:7px;height:6px;overflow:hidden}
.pgf{height:100%;border-radius:7px;transition:width .4s ease}
.pgn{font-size:12px;font-weight:700;color:#666}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;margin-bottom:11px}

/* SS Quiz styles */
.qc{background:var(--card);border-radius:20px;padding:22px 18px;box-shadow:0 6px 22px rgba(0,0,0,.07);animation:slideUp .35s ease}
.qb{display:inline-block;color:#fff;padding:3px 10px;border-radius:8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
.qt{font-size:16px;font-weight:800;line-height:1.5;margin-bottom:16px}
.diff{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-left:6px;vertical-align:middle}
.diff.hard{background:#FFEBEE;color:#C62828}
.diff.medium{background:#FFF3E0;color:#E65100}

.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:rgba(245,245,245,.8);border:2px solid transparent;border-radius:13px;padding:12px 15px;cursor:pointer;text-align:left;font-size:13px;font-weight:600;color:#333;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:10px;-webkit-appearance:none}
.opt:active:not(.lk){transform:scale(.98)}
.opt.lk{cursor:default}
.opt.cor{background:var(--correct-bg);border-color:var(--correct);color:#2E7D32}
.opt.wrg{background:var(--wrong-bg);border-color:var(--wrong);color:#C62828}
.ol{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}

.tfw{display:flex;gap:11px}
.tf{flex:1;padding:15px;border-radius:15px;border:3px solid #E0E0E0;background:#fff;cursor:pointer;font-family:inherit;font-size:16px;font-weight:800;transition:all .2s;text-align:center;-webkit-appearance:none}
.tf:active:not(.lk){transform:scale(.96)}
.tf.lk{cursor:default}
.tf.cor{background:var(--correct-bg);border-color:var(--correct);color:#2E7D32}
.tf.wrg{background:var(--wrong-bg);border-color:var(--wrong);color:#C62828}

.expl{margin-top:13px;padding:13px 15px;border-radius:13px;animation:slideUp .3s ease;line-height:1.6}
.expl.cor{background:var(--correct-bg);border:2px solid var(--correct)}
.expl.inc{background:var(--warning-bg);border:2px solid var(--warning)}
.et{font-weight:800;font-size:13px;margin-bottom:4px}
.eb{font-size:12px;color:#444;font-weight:600}
.fun{margin-top:7px;padding:8px 12px;background:#F3E5F5;border-radius:10px;font-size:11px;font-weight:600;color:#6A1B9A;border-left:3px solid #AB47BC}

.fib-input{width:100%;padding:13px 15px;border-radius:13px;border:2px solid #E0E0E0;font-size:15px;font-family:inherit;font-weight:600;color:#333;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.fib-input:focus{outline:none;border-color:#FF6B6B;box-shadow:0 0 0 3px rgba(255,107,107,.15)}
.fib-input:disabled{background:#F5F5F5}
.fib-hint{font-size:11px;color:#999;font-weight:600;margin-top:4px;font-style:italic}

.match-grid{display:flex;flex-direction:column;gap:10px}
.match-row{display:flex;align-items:center;gap:8px;background:rgba(245,245,245,.6);border-radius:12px;padding:10px 12px}
.match-label{font-weight:700;font-size:13px;flex:1;min-width:0}
.match-select{flex:1;padding:8px 10px;border-radius:10px;border:2px solid #E0E0E0;font-family:inherit;font-size:12px;font-weight:600;background:#fff;color:#333;-webkit-appearance:auto;cursor:pointer}
.match-select:disabled{background:#F5F5F5}
.match-row.cor{border:2px solid var(--correct);background:var(--correct-bg)}
.match-row.wrg{border:2px solid var(--wrong);background:var(--wrong-bg)}
.match-arrow{font-size:16px;flex-shrink:0;color:#ccc}

.hints{background:var(--hint-bg);border-radius:12px;padding:10px 14px;margin-bottom:11px;border-left:3px solid var(--hint-border)}
.ht{font-weight:800;font-size:11px;color:#F57F17;margin-bottom:4px}
.hi{font-size:11px;color:#795548;margin-bottom:2px;font-weight:600}
.wa{width:100%;min-height:120px;border-radius:13px;border:2px solid #E0E0E0;padding:12px 14px;font-size:13px;font-family:inherit;font-weight:600;resize:vertical;color:#333;line-height:1.6;-webkit-appearance:none}
.wa:focus{outline:none;border-color:#FF6B6B;box-shadow:0 0 0 3px rgba(255,107,107,.15)}
.wa:disabled{background:#F5F5F5}
.wc{text-align:right;font-size:10px;color:#999;font-weight:600;margin-top:3px}
.wfb{margin-top:11px;padding:12px 15px;border-radius:13px;font-size:12px;font-weight:600;color:#333;animation:slideUp .3s ease;line-height:1.5}
.wfb.great{background:var(--correct-bg);border:2px solid var(--correct)}
.wfb.good{background:var(--hint-bg);border:2px solid var(--hint-border)}
.wfb.try{background:var(--warning-bg);border:2px solid var(--warning)}

.sbtn{margin-top:10px;border:none;border-radius:12px;padding:11px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;-webkit-appearance:none}
.sbtn:disabled{background:#ccc!important;cursor:default}
.nbtn{margin-top:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.5px;-webkit-appearance:none}
.nbtn:active{transform:scale(.98)}

.sctr{margin-top:11px;text-align:center;font-size:12px;font-weight:700;color:rgba(0,0,0,.35);text-shadow:1px 1px 2px rgba(255,255,255,.3)}
.strk{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:3px;font-size:11px}

.rcard{text-align:center;background:var(--card);border-radius:22px;padding:28px 22px;box-shadow:0 8px 32px rgba(0,0,0,.08);animation:pop .4s ease}
.remj{font-size:52px;margin-bottom:10px;animation:float 2s ease-in-out infinite}
.rttl{font-family:'Fredoka One',cursive;font-size:24px;margin-bottom:6px}
.rtpc{font-size:14px;color:#666;font-weight:600;margin-bottom:16px}
.rring{display:inline-flex;position:relative;margin-bottom:16px}
.rpct{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.rscr{font-size:16px;font-weight:700;margin-bottom:6px}
.rmsg{font-size:12px;color:#888;font-weight:600;margin-bottom:22px}
.rbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rb{border:none;border-radius:12px;padding:12px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.rb.pri{color:#fff}
.rb.sec{background:rgba(0,0,0,.06);color:#555}

.rev{background:var(--card);border-radius:13px;padding:12px 14px;margin-bottom:7px}
.revq{font-weight:700;font-size:12px;margin-bottom:3px}
.reva{font-size:11px;color:#555;font-weight:600}
.revc{font-size:10px;font-weight:800;margin-top:2px;color:var(--correct)}

.calcard{background:var(--card);border-radius:18px;padding:18px 16px;box-shadow:0 4px 18px rgba(0,0,0,.05);margin-bottom:14px}
.calt{font-weight:800;font-size:15px;margin-bottom:3px}
.cals{font-size:11px;color:#888;font-weight:600;margin-bottom:12px}
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
.calh{font-size:10px;font-weight:800;color:#AAA;padding-bottom:3px}
.cald{width:100%;aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#999;background:rgba(0,0,0,.03)}
.cald.std{background:#E8F5E9;color:#2E7D32;position:relative}
.cald.std::after{content:'\2713';position:absolute;top:1px;right:2px;font-size:7px;color:#4CAF50}
.cald.tdy{border:2px solid #FF6B6B;color:#FF6B6B;font-weight:900}
.cald.emp{background:0 0}
.strow{display:flex;gap:8px;margin-bottom:14px}
.stcard{flex:1;background:var(--card);border-radius:14px;padding:12px 10px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.04)}
.stnum{font-family:'Fredoka One',cursive;font-size:24px}
.stlbl{font-size:10px;color:#888;font-weight:700;margin-top:2px}

.confetti{position:fixed;top:0;right:0;bottom:0;left:0;pointer-events:none;z-index:998}
.confp{position:absolute;width:10px;height:10px;top:-5%}
.ftr{text-align:center;margin-top:22px;font-size:10px;color:rgba(0,0,0,.2);font-weight:600}

/* Math lesson styles */
.lesson-title{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:10px;color:var(--text)}
.lesson-text{font-size:14px;line-height:1.8;font-weight:600;color:#333;margin-bottom:12px}
.lesson-text strong{color:var(--text)}
.frac-visual{display:flex;gap:4px;margin:12px 0;flex-wrap:wrap;justify-content:center}
.frac-piece{width:40px;height:40px;border-radius:8px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.frac-piece.filled{background:#FF6B6B;border-color:#E53935;color:white}
.frac-piece.empty{background:#f5f5f5;border-color:#ddd;color:#ccc}
.step-box{background:#F3E5F5;border-radius:14px;padding:16px;margin:12px 0;border-left:4px solid #7C4DFF}
.step-box.blue{background:#E3F2FD;border-color:#2196F3}
.step-box.green{background:var(--correct-bg);border-color:var(--correct)}
.step-box.orange{background:#FFF3E0;border-color:#FF9800}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#7C4DFF;color:white;font-weight:800;font-size:12px;margin-right:8px}
.step-box.blue .step-num{background:#2196F3}
.step-box.green .step-num{background:var(--correct)}
.step-box.orange .step-num{background:#FF9800}
.step-text{font-size:14px;font-weight:600;color:#333;line-height:1.6}
.step-math{font-family:'Fredoka One',cursive;font-size:22px;text-align:center;margin:10px 0;color:var(--text)}
.encourage{background:linear-gradient(135deg,#FFD54F,#FFB74D);border-radius:14px;padding:14px 18px;margin:14px 0;text-align:center;font-weight:700;font-size:14px;color:#5D4037}
.bar-model{display:flex;margin:12px 0;border-radius:8px;overflow:hidden;height:36px}
.bar-seg{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;border-right:2px solid rgba(255,255,255,.5)}
.bar-seg:last-child{border-right:none}
.bar-seg.on{background:#FF6B6B}
.bar-seg.off{background:#e0e0e0;color:#999}

/* Math MC */
.mc-opts{display:flex;flex-direction:column;gap:8px}
.mc-opt{background:#f5f5f5;border:2px solid transparent;border-radius:13px;padding:13px 16px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;text-align:center;transition:all .2s;-webkit-appearance:none;color:#333}
.mc-opt:active:not(.lk){transform:scale(.97)}
.mc-opt.lk{cursor:default}
.mc-opt.cor{background:var(--correct-bg);border-color:var(--correct);color:#2E7D32}
.mc-opt.wrg{background:var(--wrong-bg);border-color:var(--wrong);color:#C62828}
.fb{padding:14px 16px;border-radius:14px;margin-top:12px;font-size:13px;font-weight:600;line-height:1.6;animation:slideUp .3s ease}
.fb.correct{background:var(--correct-bg);border:2px solid var(--correct);color:#2E7D32}
.fb.wrong{background:var(--wrong-bg);border:2px solid var(--wrong);color:#C62828}

.tc-status{font-size:10px;font-weight:800;padding:3px 10px;border-radius:8px;display:inline-block;margin-top:4px}

@media(max-width:480px){.hdr h1{font-size:28px}.hdr.sm h1{font-size:20px}.qt{font-size:14px}.cald{font-size:9px}.stnum{font-size:20px}.subj-card .icon{font-size:36px}.subj-card .name{font-size:14px}.step-math{font-size:18px}.frac-piece{width:34px;height:34px;font-size:15px}}
body.well-theme{background:linear-gradient(135deg,#E8EAF6 0%,#C5CAE9 40%,#B39DDB 100%)}
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mood-card{background:var(--card);border-radius:18px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.06);border:3px solid transparent}
.mood-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.1)}
.mood-card:active{transform:scale(.96)}
.mood-card .mood-emoji{font-size:40px;margin-bottom:6px;display:block}
.mood-card .mood-name{font-weight:800;font-size:14px;color:var(--text)}
.mood-card .mood-desc{font-size:11px;color:#888;font-weight:600;margin-top:3px}
.well-card{background:var(--card);border-radius:20px;padding:24px 20px;box-shadow:0 6px 22px rgba(0,0,0,.06);margin-bottom:14px;animation:slideUp .4s ease}
.well-title{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:8px;color:var(--text)}
.well-text{font-size:14px;line-height:1.8;font-weight:600;color:#444;margin-bottom:12px}
.breathe-circle{width:160px;height:160px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:20px;color:white;transition:transform 4s ease-in-out, background 4s ease-in-out}
.breathe-circle.inhale{transform:scale(1.35);background:rgba(100,181,246,.85)}
.breathe-circle.exhale{transform:scale(0.8);background:rgba(186,104,200,.7)}
.breathe-circle.hold{transform:scale(1.35);background:rgba(129,199,132,.8)}
.breathe-circle.rest{transform:scale(1);background:rgba(200,200,200,.5)}
.sense-grid{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap;justify-content:center}
.sense-item{text-align:center;padding:10px 8px;border-radius:14px;cursor:pointer;transition:all .2s;border:2px solid #e0e0e0;background:white;flex:1;min-width:55px}
.sense-item.active{border-color:#7C4DFF;background:#EDE7F6}
.sense-item.done{border-color:#4CAF50;background:#E8F5E9}
.sense-item .sense-num{font-family:'Fredoka One',cursive;font-size:22px;display:block}
.sense-item .sense-label{font-size:9px;font-weight:700;color:#666;margin-top:2px}
.worry-sort{display:flex;gap:10px;margin:14px 0}
.worry-bucket{flex:1;background:white;border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;border:3px solid #e0e0e0;transition:all .2s;-webkit-appearance:none}
.worry-bucket:active{transform:scale(.96)}
.worry-bucket.sel{border-color:#7C4DFF;background:#EDE7F6}
.worry-bucket .bucket-emoji{font-size:28px;display:block;margin-bottom:4px}
.worry-bucket .bucket-label{font-weight:800;font-size:12px}
.worry-bucket .bucket-desc{font-size:10px;color:#888;font-weight:600;margin-top:2px}
.dump-area{width:100%;min-height:140px;border-radius:16px;border:2px dashed #B39DDB;padding:14px;font-size:14px;font-family:inherit;font-weight:600;resize:vertical;color:#333;line-height:1.7;background:rgba(255,255,255,.7);-webkit-appearance:none}
.dump-area:focus{outline:none;border-color:#7C4DFF;border-style:solid;box-shadow:0 0 0 3px rgba(124,77,255,.15)}
.chunk-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.chunk-item{display:flex;align-items:center;gap:10px;background:white;border-radius:14px;padding:12px 14px;border:2px solid #e0e0e0;animation:slideUp .3s ease}
.chunk-item.done{background:#E8F5E9;border-color:#4CAF50}
.chunk-check{width:28px;height:28px;border-radius:50%;border:3px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;-webkit-appearance:none;background:white;font-family:inherit;padding:0}
.chunk-check.checked{background:#4CAF50;border-color:#4CAF50;color:white}
.chunk-text{font-weight:600;font-size:13px;flex:1}
.journal-prompt{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:16px;padding:16px;margin:12px 0;text-align:center;font-weight:700;font-size:15px;color:#5D4037}
